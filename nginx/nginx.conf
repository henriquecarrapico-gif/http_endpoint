server {
    listen 80;

    # Serve the map HTML page directly from disk without hitting Flask
    location = /map {
        alias /usr/share/nginx/html/templates/map.html;
        default_type text/html;
    }

    location / {
        resolver 127.0.0.11 valid=30s;
        set $backend flask-server:5000;
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Graceful backend reconnect settings during sub-second restarts
        proxy_connect_timeout 2s;
        proxy_read_timeout 60s;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
    }
}
