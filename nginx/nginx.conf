server {
    listen 80;

    # Serve the map HTML page directly from disk without hitting Flask
    location = /map {
        alias /usr/share/nginx/html/templates/map.html;
        default_type text/html;
    }

    # ── Uplink endpoint → Flask first, fallback to uplink-receiver ──
    # Tries the full-featured Flask /uplink (with WebSocket pushes)
    # first. If Flask is down (502/503/504), falls back to the
    # always-on uplink-receiver so detections never get lost.
    location /uplink {
        resolver 127.0.0.11 valid=30s;
        set $backend flask-server:5000;
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 2s;
        proxy_read_timeout 60s;

        # If Flask is down, fall back to the uplink-receiver
        error_page 502 503 504 = @uplink_fallback;
    }

    # ── Fallback: always-on uplink-receiver ──────────────
    location @uplink_fallback {
        resolver 127.0.0.11 valid=30s;
        set $uplink uplink-receiver:5001;
        proxy_pass http://$uplink;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 2s;
        proxy_read_timeout 60s;
    }

    # ── Everything else → Flask dashboard server ─────────
    location / {
        resolver 127.0.0.11 valid=30s;
        set $backend flask-server:5000;
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Graceful backend reconnect settings during sub-second restarts
        proxy_connect_timeout 2s;
        proxy_read_timeout 60s;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;

        # Return 503 cleanly when Flask is down instead of a generic error
        error_page 502 503 504 =503 @flask_down;
    }

    location @flask_down {
        default_type application/json;
        return 503 '{"status": "unavailable", "message": "Dashboard server is offline. Uplink is still active."}';
    }
}
