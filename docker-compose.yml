# ─────────────────────────────────────────────────────────
# DIVS Flask Server
# Requires the infrastructure stack (docker-compose.infra.yml)
# to be running first so postgres is available on divs-net.
#
# Usage:
#   docker compose up -d          # start the server
#   docker compose down           # stop the server (DB stays up)
#   docker compose up -d --build  # rebuild & restart
# ─────────────────────────────────────────────────────────

services:
  flask-server:
    build: ./Flask
    container_name: DIVS-flask
    restart: always
    env_file: .env
    volumes:
      - ./Flask:/app # Mount source code for live container reload
      - /app/templates # Template rendering fallback protection
      - ./support:/support
    networks:
      - divs-net
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
          pids: 100
        reservations:
          cpus: "0.15"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "5"

networks:
  divs-net:
    external: true