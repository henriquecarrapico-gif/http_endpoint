services:
  postgres:
    image: postgres:15
    container_name: DIVS-postgres
    restart: always
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - divs-net

  db-backup:
    image: postgres:15
    container_name: DIVS-db-backup
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./backups:/backups
      - ./db-backup.sh:/db-backup.sh:ro
      - ./init.sql:/init.sql:ro
    entrypoint: ["bash", "/db-backup.sh"]
    stop_grace_period: 30s
    networks:
      - divs-net

  flask-server:
    build: ./Flask
    container_name: DIVS-flask
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./Flask:/app # Mount source code for live container reload
      - /app/templates # Template rendering fallback protection
      - ./support:/support
    networks:
      - divs-net

volumes:
  postgres_data:

networks:
  divs-net:
    external: true