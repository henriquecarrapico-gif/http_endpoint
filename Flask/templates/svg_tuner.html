<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aircraft SVG Size Tuner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 24px;
  }

  h1 {
    text-align: center;
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    text-align: center;
    color: #94a3b8;
    margin-bottom: 24px;
    font-size: 0.9rem;
  }

  /* Global controls */
  .global-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    margin-bottom: 24px;
    padding: 16px 24px;
    background: #1e293b;
    border-radius: 12px;
    border: 1px solid #334155;
    flex-wrap: wrap;
  }

  .global-controls label {
    font-weight: 600;
    font-size: 0.95rem;
    color: #cbd5e1;
  }

  .global-controls input[type="range"] {
    width: 200px;
    accent-color: #60a5fa;
  }

  .global-value {
    font-family: 'Courier New', monospace;
    font-size: 1.1rem;
    color: #60a5fa;
    font-weight: 700;
    min-width: 48px;
    text-align: center;
  }

  .preview-toggle {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .preview-toggle button {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid #475569;
    background: #1e293b;
    color: #e2e8f0;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
  }

  .preview-toggle button.active {
    background: #3b82f6;
    border-color: #3b82f6;
    color: white;
  }

  .preview-toggle button:hover { border-color: #60a5fa; }

  /* Grid */
  .icons-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .icon-card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 16px;
    transition: border-color 0.2s;
  }

  .icon-card:hover { border-color: #60a5fa; }

  .icon-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .icon-card-header h3 {
    font-size: 0.85rem;
    font-weight: 600;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .icon-card-header .size-badge {
    font-family: 'Courier New', monospace;
    font-size: 0.8rem;
    color: #60a5fa;
    background: #1e293b;
    border: 1px solid #334155;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .icon-preview-area {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100px;
    margin-bottom: 12px;
    border-radius: 8px;
    position: relative;
    overflow: hidden;
  }

  .icon-preview-area.bg-dark { background: #0f172a; }
  .icon-preview-area.bg-light { background: #f1f5f9; }
  .icon-preview-area.bg-sat { background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"><rect fill="%23334155" width="40" height="40"/><rect fill="%232a3a4e" x="0" y="0" width="20" height="20"/><rect fill="%232a3a4e" x="20" y="20" width="20" height="20"/></svg>'); }

  /* Crosshair */
  .icon-preview-area::before,
  .icon-preview-area::after {
    content: '';
    position: absolute;
    background: rgba(96, 165, 250, 0.15);
  }
  .icon-preview-area::before { width: 1px; height: 100%; left: 50%; }
  .icon-preview-area::after  { height: 1px; width: 100%; top: 50%; }

  .icon-preview-area svg {
    transition: width 0.15s, height 0.15s;
    filter: drop-shadow(0 0 3px rgba(0,0,0,0.6));
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .slider-row label {
    font-size: 0.8rem;
    color: #64748b;
    min-width: 40px;
  }

  .slider-row input[type="range"] {
    flex: 1;
    accent-color: #60a5fa;
  }

  .slider-row .val {
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    color: #e2e8f0;
    min-width: 36px;
    text-align: right;
  }

  /* Export section */
  .export-section {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 20px;
  }

  .export-section h2 {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 12px;
    color: #60a5fa;
  }

  .export-section pre {
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 16px;
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    color: #a5f3fc;
    overflow-x: auto;
    line-height: 1.6;
    white-space: pre-wrap;
  }

  .copy-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 12px;
    padding: 8px 20px;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }

  .copy-btn:hover { background: #2563eb; }
  .copy-btn.copied { background: #22c55e; }

  .reset-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 12px;
    margin-left: 8px;
    padding: 8px 20px;
    background: transparent;
    color: #94a3b8;
    border: 1px solid #475569;
    border-radius: 8px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .reset-btn:hover { border-color: #f87171; color: #f87171; }

  .rotation-input {
    width: 60px;
    padding: 4px 8px;
    background: #0f172a;
    border: 1px solid #475569;
    border-radius: 4px;
    color: #e2e8f0;
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    text-align: center;
  }
</style>
</head>
<body>

<h1>✈️ Aircraft SVG Icon Size Tuner</h1>
<p class="subtitle">Adjust individual scales to normalize icons, then export the config to your map.</p>

<!-- Global Controls -->
<div class="global-controls">
  <label>🔍 Global Scale</label>
  <input type="range" id="globalScale" min="0.5" max="4" step="0.1" value="1.0">
  <span class="global-value" id="globalScaleVal">1.0×</span>

  <label>🎨 Fill Color</label>
  <input type="color" id="globalColor" value="#f59e0b" style="width:36px;height:28px;border:none;cursor:pointer;">

  <label>↻ Rotation</label>
  <input type="number" class="rotation-input" id="globalRotation" value="0" min="0" max="360" step="15">
  <span style="color:#64748b">°</span>

  <div class="preview-toggle">
    <button class="active" data-bg="bg-dark">Dark</button>
    <button data-bg="bg-light">Light</button>
    <button data-bg="bg-sat">Grid</button>
  </div>
</div>

<div class="icons-grid" id="iconsGrid"></div>

<!-- Export -->
<div class="export-section">
  <h2>📋 Export Config</h2>
  <pre id="exportCode">// Adjust sizes above, then copy this config</pre>
  <button class="copy-btn" id="copyBtn">📋 Copy to Clipboard</button>
  <button class="reset-btn" id="resetBtn">🔄 Reset All</button>
</div>

<script>
  const SVG_FILE_MAP = {
    ultralight:  { file: 'mono propeller ultralight', label: 'Ultralight / Glider', defaultScale: 1.0 },
    light:       { file: 'jet ryanair',              label: 'Light GA / Prop',     defaultScale: 1.0 },
    bizjet:      { file: 'jet',                       label: 'Business Jet',        defaultScale: 1.0 },
    jet2:        { file: 'jet2',                      label: 'Small Jet',           defaultScale: 1.0 },
    jet:         { file: 'airliner 2 engines',        label: 'Airliner 2-Eng',      defaultScale: 1.0 },
    jet_short:   { file: 'airliner 2 engines short',  label: 'Airliner 2-Eng Short',defaultScale: 1.0 },
    jet_shorter: { file: 'airliner 2 engines shorter',label: 'Airliner 2-Eng Shorter',defaultScale: 1.0},
    jet_long:    { file: 'airliner 2 engines long',   label: 'Airliner 2-Eng Long', defaultScale: 1.0 },
    heavy:       { file: 'airliner 4 engine',         label: 'Heavy 4-Engine',      defaultScale: 1.0 },
    fighter:     { file: 'fighter',                    label: 'Fighter Jet',         defaultScale: 1.0 },
    bomber:      { file: 'bomber jet',                label: 'Bomber / Stealth',    defaultScale: 1.0 },
    heli:        { file: 'helicoper',                 label: 'Helicopter',           defaultScale: 1.0 },
    fire:        { file: 'fire',                      label: 'Fire / Emergency',     defaultScale: 1.0 },
  };

  const BASE_SIZE = 28; // px — the "1.0x" reference size
  const svgContent = {};
  const iconScales = {};
  let currentBg = 'bg-dark';

  // Load all SVGs
  async function loadSvgs() {
    const entries = Object.entries(SVG_FILE_MAP);
    await Promise.all(entries.map(async ([key, info]) => {
      try {
        const resp = await fetch(`/static/airplanes/${encodeURIComponent(info.file)}.svg`);
        let svg = await resp.text();
        svg = svg.replace(/fill="[^"]*"/g, '');
        svgContent[key] = svg;
      } catch {
        svgContent[key] = '<svg viewBox="0 0 32 32"><path d="M16 1 L14.5 8 L3 15 L3 17 L14.5 14 L14.5 25 L10 28 L10 30 L16 27.5 L22 30 L22 28 L17.5 25 L17.5 14 L29 17 L29 15 L17.5 8 Z"/></svg>';
      }
      iconScales[key] = info.defaultScale;
    }));
    buildGrid();
    updateAll();
  }

  function buildGrid() {
    const grid = document.getElementById('iconsGrid');
    grid.innerHTML = '';

    Object.entries(SVG_FILE_MAP).forEach(([key, info]) => {
      const card = document.createElement('div');
      card.className = 'icon-card';
      card.innerHTML = `
        <div class="icon-card-header">
          <h3>${info.label}</h3>
          <span class="size-badge" id="badge-${key}">${BASE_SIZE}px</span>
        </div>
        <div class="icon-preview-area ${currentBg}" id="preview-${key}">
          <div id="svgwrap-${key}" style="display:flex;align-items:center;justify-content:center;"></div>
        </div>
        <div class="slider-row">
          <label>Scale</label>
          <input type="range" id="scale-${key}" min="0.2" max="3.0" step="0.05" value="${iconScales[key]}">
          <span class="val" id="val-${key}">${iconScales[key].toFixed(2)}</span>
        </div>
      `;
      grid.appendChild(card);

      card.querySelector(`#scale-${key}`).addEventListener('input', (e) => {
        iconScales[key] = parseFloat(e.target.value);
        updateAll();
      });
    });
  }

  function updateAll() {
    const globalScale = parseFloat(document.getElementById('globalScale').value);
    const color = document.getElementById('globalColor').value;
    const rotation = parseInt(document.getElementById('globalRotation').value) || 0;

    document.getElementById('globalScaleVal').textContent = globalScale.toFixed(1) + '×';

    Object.keys(SVG_FILE_MAP).forEach(key => {
      const effectiveScale = iconScales[key] * globalScale;
      const pxSize = Math.round(BASE_SIZE * effectiveScale);

      // Update badge
      const badge = document.getElementById(`badge-${key}`);
      if (badge) badge.textContent = pxSize + 'px';

      // Update value label
      const valEl = document.getElementById(`val-${key}`);
      if (valEl) valEl.textContent = iconScales[key].toFixed(2);

      // Update preview
      const wrap = document.getElementById(`svgwrap-${key}`);
      if (wrap && svgContent[key]) {
        let svg = svgContent[key];
        svg = svg.replace('<svg ', `<svg style="fill:${color};width:${pxSize}px;height:${pxSize}px;" `);
        wrap.innerHTML = svg;
        wrap.style.transform = `rotate(${rotation}deg)`;
      }
    });

    updateExport();
  }

  function updateExport() {
    const globalScale = parseFloat(document.getElementById('globalScale').value);
    const lines = ['// Paste this into map.html — SVG icon size config'];
    lines.push(`const SVG_BASE_SIZE = ${BASE_SIZE};`);
    lines.push(`const SVG_GLOBAL_SCALE = ${globalScale.toFixed(2)};`);
    lines.push('const SVG_ICON_SCALES = {');
    Object.entries(iconScales).forEach(([key, scale]) => {
      const label = SVG_FILE_MAP[key].label;
      lines.push(`    ${key.padEnd(14)}: ${scale.toFixed(2)},  // ${label}`);
    });
    lines.push('};');
    lines.push('');
    lines.push('// Usage in getIconSize(key):');
    lines.push('// const px = Math.round(SVG_BASE_SIZE * (SVG_ICON_SCALES[key] || 1) * SVG_GLOBAL_SCALE);');
    lines.push('// return [px, px];');

    document.getElementById('exportCode').textContent = lines.join('\n');
  }

  // Event listeners
  document.getElementById('globalScale').addEventListener('input', updateAll);
  document.getElementById('globalColor').addEventListener('input', updateAll);
  document.getElementById('globalRotation').addEventListener('input', updateAll);

  // Background toggle
  document.querySelectorAll('.preview-toggle button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.preview-toggle button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentBg = btn.dataset.bg;
      document.querySelectorAll('.icon-preview-area').forEach(el => {
        el.className = 'icon-preview-area ' + currentBg;
      });
    });
  });

  // Copy button
  document.getElementById('copyBtn').addEventListener('click', () => {
    const code = document.getElementById('exportCode').textContent;
    navigator.clipboard.writeText(code).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '✅ Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '📋 Copy to Clipboard'; btn.classList.remove('copied'); }, 2000);
    });
  });

  // Reset button
  document.getElementById('resetBtn').addEventListener('click', () => {
    Object.keys(SVG_FILE_MAP).forEach(key => {
      iconScales[key] = 1.0;
      const slider = document.getElementById(`scale-${key}`);
      if (slider) slider.value = 1.0;
    });
    document.getElementById('globalScale').value = 1.0;
    document.getElementById('globalRotation').value = 0;
    updateAll();
  });

  // Boot
  loadSvgs();
</script>
</body>
</html>
