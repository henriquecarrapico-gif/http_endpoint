<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIVS Gateway - Node Map</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <!-- Leaflet Geocoder CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <!-- Google Fonts Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #0f172a;
        }

        #map-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        #map {
            height: 100%;
            width: 100%;
            background: #1e293b;
        }

        /* Custom map control for sidebar */
        .leaflet-control-sidebar-toggle {
            background-color: white;
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            cursor: pointer;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background-clip: padding-box;
        }

        .leaflet-control-sidebar-toggle:hover {
            background-color: #f4f4f4;
        }

        /* Sidebar styling */

        #sidebar {
            position: absolute;
            top: 0;
            right: -300px;
            width: 300px;
            height: 100vh;
            background: white;
            box-shadow: -2px 0 5px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            transition: right 0.3s;
            display: flex;
            flex-direction: column;
        }

        #sidebar.open {
            right: 0;
        }

        .sidebar-header {
            padding: 15px;
            background: #2196F3;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-close {
            cursor: pointer;
            font-size: 20px;
        }

        .node-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .node-item {
            background: #f9f9f9;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 11px;
        }

        button.action-btn {
            padding: 3px 6px;
        }

        .leaflet-popup-content {
            font-size: 14px;
        }

        .node-item h4 {
            margin: 0 0 5px 0;
            font-size: 14px;
        }

        .node-actions {
            display: flex;
            gap: 5px;
            margin-top: 8px;
        }

        .node-actions button {
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid #ccc;
            background: white;
            border-radius: 3px;
        }

        .node-actions button:hover {
            background: #eee;
        }

        /* Tooltip styling */
        .node-tooltip {
            background: transparent;
            border: none;
            box-shadow: none;
            font-weight: bold;
            color: #333;
            text-shadow: 1px 1px 2px white, -1px -1px 2px white, 1px -1px 2px white, -1px 1px 2px white;
        }
    </style>
</head>

<body>

    <div id="map-container">
        <div id="map"></div>
        


        <div id="sidebar">
            <div class="sidebar-header">
                <h3 style="margin: 0; font-size: 16px;">Registered Nodes</h3>
                <span class="sidebar-close" onclick="toggleSidebar()">✕</span>
            </div>
            <div style="padding: 10px 15px; border-bottom: 1px solid #ccc; background: #f4f4f4;">
                <input type="text" id="searchInput" placeholder="Search nodes/gateways..."
                    style="width: 100%; padding: 6px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;"
                    onkeyup="filterSidebar()">
            </div>
            <div style="padding: 12px 15px; border-bottom: 1px solid #e0e0e0; background: #fafafa;">
                <label for="timeWindowInput"
                    style="font-size: 11px; font-weight: bold; color: #555; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px;">⏱️
                    Triangulation Window</label>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <input type="range" id="timeWindowInput" min="1" max="15" step="0.5" value="3.0"
                        style="flex-grow: 1; accent-color: #e64a19; cursor: pointer;"
                        oninput="updateTimeWindow(this.value)">
                    <span id="timeWindowVal"
                        style="font-size: 13px; font-weight: bold; color: #e64a19; min-width: 38px; text-align: right;">3.0s</span>
                </div>
            </div>
            <div style="padding: 12px 15px; border-bottom: 1px solid #e0e0e0; background: #fafafa;">
                <label for="azimuthUncertaintyInput"
                    style="font-size: 11px; font-weight: bold; color: #555; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px;">📐
                    Angular Uncertainty</label>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <input type="range" id="azimuthUncertaintyInput" min="1" max="25" step="0.5" value="5.0"
                        style="flex-grow: 1; accent-color: #d84315; cursor: pointer;"
                        oninput="updateAzimuthUncertainty(this.value)">
                    <span id="azimuthUncertaintyVal"
                        style="font-size: 13px; font-weight: bold; color: #d84315; min-width: 38px; text-align: right;">±5.0°</span>
                </div>
            </div>
            <div style="padding: 12px 15px; border-bottom: 1px solid #e0e0e0; background: #fafafa;">
                <label for="fadeOutInput"
                    style="font-size: 11px; font-weight: bold; color: #555; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px;">🧹
                    Fade Out Lifetime</label>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <input type="range" id="fadeOutInput" min="10" max="300" step="5" value="60"
                        style="flex-grow: 1; accent-color: #0288d1; cursor: pointer;"
                        oninput="updateFadeOut(this.value)">
                    <span id="fadeOutVal"
                        style="font-size: 13px; font-weight: bold; color: #0288d1; min-width: 38px; text-align: right;">60s</span>
                </div>
            </div>
            <div class="node-list" id="nodeList">
                <!-- Nodes dynamically injected here by JS -->
            </div>
        </div>
    </div>



    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <!-- Leaflet Geocoder JS -->
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script>
        // Initialize the map, centered on specific coordinates
        const worldBounds = [
            [-90, -180],
            [90, 180]
        ];

        const map = L.map('map', {
            maxBounds: worldBounds,
            maxBoundsViscosity: 1.0 // Prevents dragging completely outside the bounds
        }).setView([41.4, -7.8], 8);

        // Calculate and set the minimum zoom required to fit the bounds
        map.setMinZoom(map.getBoundsZoom(worldBounds, true));

        // Update minZoom dynamically if window is resized
        window.addEventListener('resize', function () {
            map.setMinZoom(map.getBoundsZoom(worldBounds, true));
        });

        // Add OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            noWrap: true, // Stops the map tiles from repeating horizontally
            bounds: worldBounds,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Add Geocoder search control to map
        L.Control.geocoder({
            defaultMarkGeocode: true,
            position: 'topleft'
        }).addTo(map);

        let popup = L.popup();

        // Store references to map objects for hiding/showing/updating
        const nodeObjects = {};
        const nodesData = [];
        const gatewayObjects = {};
        const gatewaysData = [];
        const connectionLines = {};

        // Manage state for adding vs editing
        let currentEditId = null;
        let currentEditType = null; // 'node' or 'gateway'

        // Connect to WebSocket
        const socket = io();

        // Function to calculate color from green (0) to red (63)
        // Sound group color mapper based on class_groups.csv categories
        function getGroupColor(groupName) {
            if (!groupName) return '#64748b'; // default slate
            const name = groupName.toLowerCase();
            if (name === 'ordnance') return '#dc2626'; // Crimson
            if (name === 'alarm' || name === 'emergency_vehicle') return '#ea580c'; // Amber Orange
            if (name === 'human') return '#0d9488'; // Teal
            if (name === 'music') return '#8b5cf6'; // Purple
            if (name.includes('car') || name.includes('truck') || name.includes('train') || name.includes('aircraft') || name.includes('engine') || name.includes('vehicle')) return '#475569'; // Slate Grey
            if (name.includes('animal') || name.includes('pet') || name.includes('livestock') || name.includes('bird') || name.includes('insect') || name.includes('frog')) return '#16a34a'; // Green
            return '#64748b'; // Default Slate
        }

        // Triangulation state
        const activeDetections = [];
        const activeTriangulations = new Set();
        let AZIMUTH_UNCERTAINTY = 5.0; // Configurable ±degrees error envelope
        let TRIANGULATION_WINDOW_MS = 3000; // Configurable window in milliseconds
        let FADE_OUT_TIME_MS = 60000; // Configurable detection fadeout lifetime (default 60s)

        window.soundClasses = {};

        // Helper to handle 24h midnight rollover for seconds past midnight
        function getSecsDifference(t1, t2) {
            let diff = Math.abs(t1 - t2);
            if (diff > 43200) {
                diff = 86400 - diff;
            }
            return diff;
        }

        function updateTimeWindow(val) {
            const seconds = parseFloat(val);
            if (!isNaN(seconds) && seconds > 0) {
                TRIANGULATION_WINDOW_MS = seconds * 1000;
                document.getElementById('timeWindowVal').innerText = seconds.toFixed(1) + 's';
                console.log("Updated triangulation window to:", TRIANGULATION_WINDOW_MS, "ms");
            }
        }

        function updateAzimuthUncertainty(val) {
            const degrees = parseFloat(val);
            if (!isNaN(degrees) && degrees > 0) {
                AZIMUTH_UNCERTAINTY = degrees;
                document.getElementById('azimuthUncertaintyVal').innerText = '±' + degrees.toFixed(1) + '°';
                console.log("Updated azimuth uncertainty to:", AZIMUTH_UNCERTAINTY, "degrees");
            }
        }

        function updateFadeOut(val) {
            const seconds = parseFloat(val);
            if (!isNaN(seconds) && seconds >= 10) {
                FADE_OUT_TIME_MS = seconds * 1000;
                document.getElementById('fadeOutVal').innerText = seconds.toFixed(0) + 's';
                console.log("Updated fade out lifetime to:", FADE_OUT_TIME_MS, "ms");
            }
        }

        // Local flat-earth Mercator coordinate conversion helpers
        function latLngToLocalCartesian(lat, lon, lat_org, lon_org) {
            const R = 6378137.0; // Earth radius in meters
            const latRad = lat * Math.PI / 180;
            const latOrgRad = lat_org * Math.PI / 180;
            const lonRad = lon * Math.PI / 180;
            const lonOrgRad = lon_org * Math.PI / 180;

            const y = (latRad - latOrgRad) * R;
            const x = (lonRad - lonOrgRad) * R * Math.cos(latOrgRad);
            return { x, y };
        }

        function localCartesianToLatLng(x, y, lat_org, lon_org) {
            const R = 6378137.0;
            const latOrgRad = lat_org * Math.PI / 180;
            const latRad = latOrgRad + (y / R);
            const lonRad = (lon_org * Math.PI / 180) + (x / (R * Math.cos(latOrgRad)));
            return [latRad * 180 / Math.PI, lonRad * 180 / Math.PI];
        }

        // Ray Intersection Math using 2D Perp-Dot Products
        // Returns { x, y } in local meters, or null if parallel / invalid
        function getRayIntersection(x1, y1, az1, x2, y2, az2, range1, range2) {
            const rad1 = az1 * Math.PI / 180;
            const rad2 = az2 * Math.PI / 180;

            // Direction vectors (x: East, y: North)
            const ux = Math.sin(rad1);
            const uy = Math.cos(rad1);
            const vx = Math.sin(rad2);
            const vy = Math.cos(rad2);

            // Determinant
            const det = ux * vy - uy * vx;
            if (Math.abs(det) < 1e-6) {
                return null; // parallel or anti-parallel rays
            }

            // Ray parameter distance coefficients
            const t1 = ((x2 - x1) * vy - (y2 - y1) * vx) / det;
            const t2 = ((x2 - x1) * uy - (y2 - y1) * ux) / det;

            // Limit intersections to forward rays and within maximum range envelope
            const maxRange1 = (parseFloat(range1) || 5000) * 1.5;
            const maxRange2 = (parseFloat(range2) || 5000) * 1.5;

            if (t1 >= 0 && t2 >= 0 && t1 <= maxRange1 && t2 <= maxRange2) {
                return {
                    x: x1 + t1 * ux,
                    y: y1 + t1 * uy,
                    t1: t1,
                    t2: t2
                };
            }
            return null;
        }

        // Checks recently active detections to see if any can be triangulated with the new one
        function checkTriangulation(newDet) {
            const nodeA = nodesData.find(n => n.dev_eui === newDet.dev_eui);
            if (!nodeA) return;

            activeDetections.forEach(oldDet => {
                // Triangulate only if they belong to different towers and occur within the configured time window
                if (oldDet.dev_eui === newDet.dev_eui) return;

                // Match exactly using the target's internal secs_since_midnight values (robust against network latency)
                let timeDiff = Math.abs(newDet.secs_since_midnight - oldDet.secs_since_midnight);
                if (timeDiff > 43200) {
                    timeDiff = 86400 - timeDiff; // Correctly handle 24h midnight rollover
                }

                if (timeDiff * 1000 > TRIANGULATION_WINDOW_MS) return;

                const nodeB = nodesData.find(n => n.dev_eui === oldDet.dev_eui);
                if (!nodeB) return;

                // Create a unique key for the triangulation pair to prevent duplicate overlays
                const pairKey = [newDet.dev_eui, newDet.timestamp, oldDet.dev_eui, oldDet.timestamp].sort().join('_');
                if (activeTriangulations.has(pairKey)) return;

                // local projection origin is average position
                const lat_org = (nodeA.latitude + nodeB.latitude) / 2.0;
                const lon_org = (nodeA.longitude + nodeB.longitude) / 2.0;

                const posA = latLngToLocalCartesian(nodeA.latitude, nodeA.longitude, lat_org, lon_org);
                const posB = latLngToLocalCartesian(nodeB.latitude, nodeB.longitude, lat_org, lon_org);

                const azA = newDet.azimuth;
                const azB = oldDet.azimuth;

                // 1. Calculate primary intersection
                const centralInt = getRayIntersection(posA.x, posA.y, azA, posB.x, posB.y, azB, nodeA.range, nodeB.range);
                if (!centralInt) return; // central bearings do not cross in the forward sector within range

                // 2. Calculate the four corner boundary intersections for the ±5 degree error sector
                const azA_min = (azA - AZIMUTH_UNCERTAINTY + 360) % 360;
                const azA_max = (azA + AZIMUTH_UNCERTAINTY) % 360;
                const azB_min = (azB - AZIMUTH_UNCERTAINTY + 360) % 360;
                const azB_max = (azB + AZIMUTH_UNCERTAINTY) % 360;

                const P11 = getRayIntersection(posA.x, posA.y, azA_min, posB.x, posB.y, azB_min, nodeA.range, nodeB.range);
                const P12 = getRayIntersection(posA.x, posA.y, azA_min, posB.x, posB.y, azB_max, nodeA.range, nodeB.range);
                const P22 = getRayIntersection(posA.x, posA.y, azA_max, posB.x, posB.y, azB_max, nodeA.range, nodeB.range);
                const P21 = getRayIntersection(posA.x, posA.y, azA_max, posB.x, posB.y, azB_min, nodeA.range, nodeB.range);

                let polyCoords = [];
                let shapeType = "quadrilateral";

                if (P11 && P12 && P22 && P21) {
                    // Draw exact convex quadrilateral region
                    polyCoords = [
                        localCartesianToLatLng(P11.x, P11.y, lat_org, lon_org),
                        localCartesianToLatLng(P12.x, P12.y, lat_org, lon_org),
                        localCartesianToLatLng(P22.x, P22.y, lat_org, lon_org),
                        localCartesianToLatLng(P21.x, P21.y, lat_org, lon_org)
                    ];
                } else {
                    // Fallback to local 15m diamond centered on central ray intersection point
                    shapeType = "fallback-diamond";
                    const size = 15.0; // meters
                    polyCoords = [
                        localCartesianToLatLng(centralInt.x - size, centralInt.y, lat_org, lon_org),
                        localCartesianToLatLng(centralInt.x, centralInt.y + size, lat_org, lon_org),
                        localCartesianToLatLng(centralInt.x + size, centralInt.y, lat_org, lon_org),
                        localCartesianToLatLng(centralInt.x, centralInt.y - size, lat_org, lon_org)
                    ];
                }

                // Add to active set to avoid duplicate drawing
                activeTriangulations.add(pairKey);

                // Render shaded uncertainty polygon
                const uncertaintyPoly = L.polygon(polyCoords, {
                    color: '#e64a19',     // premium amber-orange border
                    fillColor: '#ff5722', // translucent orange fill
                    fillOpacity: 0.25,
                    weight: 2,
                    dashArray: '4, 4',
                    className: 'triangulation-polygon'
                }).addTo(map);

                // Bind a descriptive informative popup
                let timeDiffSecs = Math.abs(newDet.secs_since_midnight - oldDet.secs_since_midnight);
                if (timeDiffSecs > 43200) {
                    timeDiffSecs = 86400 - timeDiffSecs;
                }
                const centerLatLng = localCartesianToLatLng(centralInt.x, centralInt.y, lat_org, lon_org);

                uncertaintyPoly.bindPopup(`
                    <div style="font-family: Arial, sans-serif; min-width: 220px; font-size: 13px;">
                        <h4 style="margin: 0 0 8px 0; color: #d84315; border-bottom: 2px solid #ffab91; padding-bottom: 4px; font-size: 14px;">🎯 Sound Source Triangulated</h4>
                        <b>Participating Towers:</b><br/>
                        <span style="color: purple;">●</span> ${nodeA.name || 'Unnamed Tower'} (Azimuth: ${parseFloat(azA).toFixed(1)}°)<br/>
                        <span style="color: purple;">●</span> ${nodeB.name || 'Unnamed Tower'} (Azimuth: ${parseFloat(azB).toFixed(1)}°)<br/>
                        <div style="margin-top: 8px; border-top: 1px dashed #ccc; padding-top: 6px; font-size: 11px; color: #555;">
                             <b>Coincidence Offset:</b> ${timeDiffSecs.toFixed(2)} seconds<br/>
                            <b>Estimated Origin:</b> ${centerLatLng[0].toFixed(6)}, ${centerLatLng[1].toFixed(6)}<br/>
                            <b>Geometry Mode:</b> ${shapeType}
                        </div>
                    </div>
                `);

                // Fade out the polygon over the remaining lifetime of the youngest detection in the pair
                const elapsedNew = Date.now() - newDet.timestamp;
                const elapsedOld = Date.now() - oldDet.timestamp;
                const remainingTime = Math.max(0, FADE_OUT_TIME_MS - Math.max(elapsedNew, elapsedOld));

                setTimeout(() => {
                    let opacity = 0.25;
                    const fadeInterval = setInterval(() => {
                        opacity -= 0.02;
                        if (opacity <= 0) {
                            clearInterval(fadeInterval);
                            map.removeLayer(uncertaintyPoly);
                            activeTriangulations.delete(pairKey);
                        } else {
                            uncertaintyPoly.setStyle({ fillOpacity: opacity, opacity: opacity * 4.0 });
                        }
                    }, 40);
                }, remainingTime);
            });
        }

        function drawDetection(det, ageMs = 0) {
            if (det.azimuth === null || det.azimuth === undefined) return;

            const now = Date.now();
            let secsSinceMidnight = det.secs_since_midnight;
            if (secsSinceMidnight === undefined || secsSinceMidnight === null) {
                // Fallback to browser local seconds since midnight if not provided
                const d = new Date(now - ageMs);
                secsSinceMidnight = d.getHours() * 3600 + d.getMinutes() * 60 + d.getSeconds() + d.getMilliseconds() / 1000;
            }

            const node = nodesData.find(n => n.dev_eui === det.dev_eui);
            if (node) {
                const detectionRecord = {
                    dev_eui: det.dev_eui,
                    azimuth: parseFloat(det.azimuth),
                    type_code: det.type_code,
                    timestamp: now - ageMs,
                    secs_since_midnight: parseFloat(secsSinceMidnight)
                };
                activeDetections.push(detectionRecord);

                // Auto-cleanup detection record after FADE_OUT_TIME_MS
                const remainingTime = Math.max(0, FADE_OUT_TIME_MS - ageMs);
                setTimeout(() => {
                    const idx = activeDetections.indexOf(detectionRecord);
                    if (idx !== -1) {
                        activeDetections.splice(idx, 1);
                    }
                }, remainingTime);

                // Calculate bearing destination point
                const radiusEarth = 6378137; // meters
                const distance = parseFloat(node.range || 5000);
                const brng = det.azimuth * Math.PI / 180;
                const lat1 = node.latitude * Math.PI / 180;
                const lon1 = node.longitude * Math.PI / 180;

                const lat2 = Math.asin(Math.sin(lat1) * Math.cos(distance / radiusEarth) +
                    Math.cos(lat1) * Math.sin(distance / radiusEarth) * Math.cos(brng));
                const lon2 = lon1 + Math.atan2(Math.sin(brng) * Math.sin(distance / radiusEarth) * Math.cos(lat1),
                    Math.cos(distance / radiusEarth) - Math.sin(lat1) * Math.sin(lat2));

                const destLat = lat2 * 180 / Math.PI;
                const destLng = lon2 * 180 / Math.PI;

                // Look up group name in soundClasses to determine the color
                const classInfo = window.soundClasses[det.type_code];
                const gName = classInfo ? classInfo.group_name : 'Unknown';
                const color = getGroupColor(gName);

                // Reduce the opacity and weight of the lines, except for when the typecode is 0 or 63.
                const tcVal = parseInt(det.type_code);
                const isImportantType = (tcVal === 0 || tcVal === 63);
                const lineOpacity = isImportantType ? 0.8 : 0.25;
                const lineWeight = isImportantType ? 4 : 2;

                const detectionLine = L.polyline([
                    [node.latitude, node.longitude],
                    [destLat, destLng]
                ], {
                    color: color,
                    weight: lineWeight,
                    opacity: lineOpacity
                }).addTo(map);

                // Fade out the bearing line
                setTimeout(() => {
                    map.removeLayer(detectionLine);
                }, remainingTime);

                // Scan for and trigger cross-triangulations
                checkTriangulation(detectionRecord);
            }
        }



        // Websocket trigger
        socket.on('new_detections', function (detections) {
            console.log("Received new detections:", detections);
            detections.forEach(det => drawDetection(det, 0));
        });

        // Configure the map to render horizontally continuously
        //map.options.worldCopyJump = true;

        // Function to draw a node on the map
        function drawNode(node) {
            if (nodeObjects[node.dev_eui]) {
                map.removeLayer(nodeObjects[node.dev_eui].marker);
                map.removeLayer(nodeObjects[node.dev_eui].circle);
                if (nodeObjects[node.dev_eui].tooltip) {
                    map.removeLayer(nodeObjects[node.dev_eui].tooltip);
                }
            }

            const nodeIcon = L.divIcon({
                className: 'custom-node-icon',
                html: '<div style="background-color:purple; width:12px; height:12px; border-radius:50%; border:2px solid white; box-shadow: 0 0 3px rgba(0,0,0,0.5);"></div>',
                iconSize: [16, 16],
                iconAnchor: [8, 8]
            });

            const marker = L.marker([node.latitude, node.longitude], {
                icon: nodeIcon,
                draggable: true
            }).addTo(map).bindPopup(`<b>Node Name:</b> ${node.name || 'Unnamed'}<br><b>Device EUI:</b> ${node.dev_eui}<br><b>Altitude:</b> ${node.altitude || 0}m<br><b>Range:</b> ${node.range}m`);

            let tooltip = null;
            if (node.name) {
                tooltip = marker.bindTooltip(node.name, {
                    permanent: true, direction: 'top', className: 'node-tooltip', offset: [0, -10]
                });
            }

            const circle = L.circle([node.latitude, node.longitude], {
                color: 'yellow',
                fillColor: 'yellow',
                fillOpacity: 0.3,
                radius: parseFloat(node.range)
            }).addTo(map);

            marker.on('drag', function (e) {
                const latlng = e.target.getLatLng();
                circle.setLatLng(latlng);
                node.latitude = latlng.lat;
                node.longitude = latlng.lng;
                drawConnections();
            });

            marker.on('dragend', function (e) {
                const latlng = e.target.getLatLng();
                const payload = {
                    name: node.name,
                    latitude: latlng.lat,
                    longitude: latlng.lng,
                    altitude: node.altitude || 0,
                    range: node.range
                };

                fetch(`/nodes/${node.dev_eui}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                }).then(res => res.json()).then(data => {
                    if (data.status === 'ok') {
                        refreshConnections();
                    } else {
                        alert("Failed to move node: " + data.message);
                    }
                }).catch(err => console.error("Error moving node:", err));
            });

            nodeObjects[node.dev_eui] = { marker, circle, tooltip, is_hidden: false };
            drawConnections(); // Redraw connections when a node is drawn/updated
        }

        // Function to draw a gateway on the map
        function drawGateway(gw) {
            if (gatewayObjects[gw.gateway_id]) {
                map.removeLayer(gatewayObjects[gw.gateway_id].marker);
                map.removeLayer(gatewayObjects[gw.gateway_id].circle);
                if (gatewayObjects[gw.gateway_id].tooltip) {
                    map.removeLayer(gatewayObjects[gw.gateway_id].tooltip);
                }
            }

            const gwIcon = L.divIcon({
                className: 'custom-gw-icon',
                html: '<div style="background-color:green; width:16px; height:16px; border-radius:50%; border:2px solid white; box-shadow: 0 0 3px rgba(0,0,0,0.5);"></div>',
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            });

            const marker = L.marker([gw.latitude, gw.longitude], {
                icon: gwIcon,
                draggable: true
            }).addTo(map).bindPopup(`<b>Gateway Name:</b> ${gw.name || 'Unnamed'}<br><b>Gateway ID:</b> ${gw.gateway_id}<br><b>Altitude:</b> ${gw.altitude || 0}m<br><b>Range:</b> ${gw.range}m`);

            let tooltip = null;
            if (gw.name) {
                tooltip = marker.bindTooltip(gw.name, {
                    permanent: true, direction: 'top', className: 'node-tooltip', offset: [0, -10]
                });
            }

            const circle = L.circle([gw.latitude, gw.longitude], {
                color: 'green',
                fillColor: 'green',
                fillOpacity: 0.2, // translucent body
                opacity: 1.0,    // opaque border
                radius: parseFloat(gw.range)
            }).addTo(map);

            marker.on('drag', function (e) {
                const latlng = e.target.getLatLng();
                circle.setLatLng(latlng);
                gw.latitude = latlng.lat;
                gw.longitude = latlng.lng;
                drawConnections();
            });

            marker.on('dragend', function (e) {
                const latlng = e.target.getLatLng();
                const payload = {
                    name: gw.name,
                    latitude: latlng.lat,
                    longitude: latlng.lng,
                    altitude: gw.altitude || 0,
                    range: gw.range
                };

                fetch(`/gateways/${gw.gateway_id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                }).then(res => res.json()).then(data => {
                    if (data.status === 'ok') {
                        refreshConnections();
                    } else {
                        alert("Failed to move gateway: " + data.message);
                    }
                }).catch(err => console.error("Error moving gateway:", err));
            });

            gatewayObjects[gw.gateway_id] = { marker, circle, tooltip, is_hidden: false };
            drawConnections(); // Redraw connections when a gateway is drawn/updated
        }

        // Function to draw connections
        function drawConnections() {
            // Clear all existing connection lines
            for (const dev_eui in connectionLines) {
                map.removeLayer(connectionLines[dev_eui]);
            }

            nodesData.forEach(node => {
                if (node.connected_gateway) {
                    const gw = gatewaysData.find(g => g.gateway_id === node.connected_gateway);
                    if (gw && nodeObjects[node.dev_eui] && gatewayObjects[gw.gateway_id]) {
                        // Only draw if both are visible
                        if (!nodeObjects[node.dev_eui].is_hidden && !gatewayObjects[gw.gateway_id].is_hidden) {
                            const line = L.polyline([
                                [node.latitude, node.longitude],
                                [gw.latitude, gw.longitude]
                            ], {
                                color: 'orange',
                                dashArray: '5, 5',
                                weight: 2
                            }).addTo(map);
                            connectionLines[node.dev_eui] = line;
                        }
                    }
                }
            });
        }

        // Render the sidebar list
        function renderSidebar() {
            const listDiv = document.getElementById('nodeList');
            listDiv.innerHTML = '';

            // Gateways Section
            const gwHeader = document.createElement('h3');
            gwHeader.innerText = "Gateways";
            gwHeader.style.marginTop = "0";
            listDiv.appendChild(gwHeader);

            gatewaysData.forEach(gw => {
                const isHidden = gatewayObjects[gw.gateway_id]?.is_hidden;
                const item = document.createElement('div');
                item.className = 'node-item';
                item.innerHTML = `
                <h4><span style="color:green;">●</span> ${gw.name || 'Unnamed GW'}</h4>
                <div style="font-size: 11px; color: #666;">ID: ${gw.gateway_id}</div>
                <div class="node-actions">
                    <button class="action-btn" onclick="centerOnItem('gateway', '${gw.gateway_id}')" title="Center on Map">📍 Center</button>
                    <button class="action-btn" onclick="toggleVisibility('gateway', '${gw.gateway_id}')" title="Toggle Visibility">${isHidden ? '👁️ Show' : '🙈 Hide'}</button>
                    <button class="action-btn" onclick="editItem('gateway', '${gw.gateway_id}')" title="Edit Gateway">✏️ Edit</button>
                    <button class="action-btn" onclick="deleteItem('gateway', '${gw.gateway_id}')" style="color: darkred;" title="Delete Gateway">🗑️ Delete</button>
                </div>
            `;
                listDiv.appendChild(item);
            });

            // Nodes Section
            const nodeHeader = document.createElement('h3');
            nodeHeader.innerText = "Nodes";
            nodeHeader.style.marginTop = "20px";
            listDiv.appendChild(nodeHeader);

            nodesData.forEach(node => {
                const isHidden = nodeObjects[node.dev_eui]?.is_hidden;
                const connectedTo = node.connected_gateway ? `Connected: ${node.connected_gateway.substring(0, 8)}...` : 'Disconnected';
                const item = document.createElement('div');
                item.className = 'node-item';
                item.innerHTML = `
                <h4><span style="color:purple;">●</span> ${node.name || 'Unnamed Node'}</h4>
                <div style="font-size: 11px; color: #666;">EUI: ${node.dev_eui}<br/>${connectedTo}</div>
                <div class="node-actions">
                    <button class="action-btn" onclick="centerOnItem('node', '${node.dev_eui}')" title="Center on Map">📍 Center</button>
                    <button class="action-btn" onclick="toggleVisibility('node', '${node.dev_eui}')" title="Toggle Visibility">${isHidden ? '👁️ Show' : '🙈 Hide'}</button>
                    <button class="action-btn" onclick="editItem('node', '${node.dev_eui}')" title="Edit Node">✏️ Edit</button>
                    <button class="action-btn" onclick="deleteItem('node', '${node.dev_eui}')" style="color: darkred;" title="Delete Node">🗑️ Delete</button>
                </div>
            `;
                listDiv.appendChild(item);
            });
        }

        // Sidebar action functions
        window.centerOnItem = function (type, id) {
            const item = type === 'node' ? nodesData.find(n => n.dev_eui === id) : gatewaysData.find(g => g.gateway_id === id);
            if (item) {
                map.flyTo([item.latitude, item.longitude], 15);
            }
        };

        window.toggleVisibility = function (type, id) {
            const objs = type === 'node' ? nodeObjects[id] : gatewayObjects[id];
            if (!objs) return;

            if (objs.is_hidden) {
                objs.marker.addTo(map);
                objs.circle.addTo(map);
                objs.is_hidden = false;
            } else {
                map.removeLayer(objs.marker);
                map.removeLayer(objs.circle);
                objs.is_hidden = true;
            }
            drawConnections(); // Need to redraw connections to show/hide the lines too
            renderSidebar();
        };

        window.filterSidebar = function () {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const items = document.querySelectorAll('.node-item');
            items.forEach(item => {
                const text = item.innerText.toLowerCase();
                if (text.includes(query)) {
                    item.style.display = '';
                } else {
                    item.style.display = 'none';
                }
            });
        };

        window.editItem = function (type, id) {
            const item = type === 'node' ? nodesData.find(n => n.dev_eui === id) : gatewaysData.find(g => g.gateway_id === id);
            if (!item) return;

            currentEditId = id;
            currentEditType = type;

            // Fit the map to the device's range circle smoothly
            const objs = type === 'node' ? nodeObjects[id] : gatewayObjects[id];
            if (objs && objs.circle) {
                map.flyToBounds(objs.circle.getBounds(), { padding: [50, 50], maxZoom: 16 });
            } else {
                map.flyTo([item.latitude, item.longitude], 15);
            }

            // Open a popup to edit at its current location
            // Delay the popup slightly so it opens during/after the fly animation starts
            setTimeout(() => {
                openFormPopup(item.latitude, item.longitude, item, type);
            }, 300);
        };

        window.deleteItem = function (type, id) {
            const item = type === 'node' ? nodesData.find(n => n.dev_eui === id) : gatewaysData.find(g => g.gateway_id === id);
            if (!item) return;

            const displayName = item.name || (type === 'node' ? item.dev_eui : item.gateway_id);
            const confirmation = window.confirm(`Are you sure you want to delete ${type === 'node' ? 'Node' : 'Gateway'} "${displayName}"?`);

            if (confirmation) {
                const endpoint = type === 'node' ? `/nodes/${id}` : `/gateways/${id}`;
                fetch(endpoint, {
                    method: 'DELETE'
                })
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === 'ok') {
                            // Remove from local arrays
                            if (type === 'node') {
                                const idx = nodesData.findIndex(n => n.dev_eui === id);
                                if (idx !== -1) nodesData.splice(idx, 1);
                                // Remove from map visually
                                if (nodeObjects[id]) {
                                    map.removeLayer(nodeObjects[id].marker);
                                    map.removeLayer(nodeObjects[id].circle);
                                    if (nodeObjects[id].tooltip) map.removeLayer(nodeObjects[id].tooltip);
                                    delete nodeObjects[id];
                                }
                            } else {
                                const idx = gatewaysData.findIndex(n => n.gateway_id === id);
                                if (idx !== -1) gatewaysData.splice(idx, 1);
                                // Remove from map visually
                                if (gatewayObjects[id]) {
                                    map.removeLayer(gatewayObjects[id].marker);
                                    map.removeLayer(gatewayObjects[id].circle);
                                    if (gatewayObjects[id].tooltip) map.removeLayer(gatewayObjects[id].tooltip);
                                    delete gatewayObjects[id];
                                }
                            }

                            // Re-render and re-fetch to fix lines
                            renderSidebar();
                            refreshConnections();
                        } else {
                            alert(`Failed to delete ${type}: ` + data.message);
                        }
                    })
                    .catch(error => {
                        console.error(`Error deleting ${type}:`, error);
                        alert("An error occurred. Check the console.");
                    });
            }
        };

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        let fetchedNodes = false;
        let fetchedGateways = false;

        function initSoundClasses() {
            return fetch('/api/sound_classes')
                .then(response => response.json())
                .then(classes => {
                    window.soundClasses = classes;
                    console.log("Loaded CSV classes: ", Object.keys(window.soundClasses).length);
                })
                .catch(err => console.error("Error fetching sound classes mapping:", err));
        }

        function checkRenderSidebar() {
            if (fetchedNodes && fetchedGateways) {
                renderSidebar();
                drawConnections();
                initSoundClasses().then(() => {
                    fetchRecentDetections();
                });
            }
        }

        function fetchRecentDetections() {
            fetch('/detections/recent')
                .then(response => response.json())
                .then(detections => {
                    if (Array.isArray(detections)) {
                        detections.forEach(det => {
                            if (det.age_ms !== undefined) {
                                // Only draw if under the current FADE_OUT_TIME_MS
                                if (det.age_ms >= 0 && det.age_ms < FADE_OUT_TIME_MS) {
                                    drawDetection(det, det.age_ms);
                                }
                            }
                        });
                    }
                })
                .catch(err => console.error("Error fetching recent detections:", err));
        }

        // Fetch existing gateways
        fetch('/gateways')
            .then(response => response.json())
            .then(gws => {
                if (Array.isArray(gws)) {
                    gws.forEach(gw => {
                        gatewaysData.push(gw);
                        drawGateway(gw);
                    });
                }
                fetchedGateways = true;
                checkRenderSidebar();
            })
            .catch(err => console.error("Error fetching gateways:", err));

        // Fetch existing nodes
        fetch('/nodes')
            .then(response => response.json())
            .then(nodes => {
                if (Array.isArray(nodes)) {
                    nodes.forEach(node => {
                        nodesData.push(node);
                        drawNode(node);
                    });
                }
                fetchedNodes = true;
                checkRenderSidebar();
            })
            .catch(err => console.error("Error fetching nodes:", err));

        // Refetch nodes to get updated connections
        function refreshConnections() {
            fetch('/nodes')
                .then(response => response.json())
                .then(nodes => {
                    if (Array.isArray(nodes)) {
                        nodesData.length = 0; // clear array perfectly
                        nodes.forEach(node => {
                            nodesData.push(node);
                            drawNode(node);
                        });
                    }
                    renderSidebar();
                });
        }

        function openFormPopup(lat, lng, editData = null, forceType = null) {
            // If not editing, allow the user to choose type by Radio button. If forceType is provided (via edit) lock the type.
            const isEdit = editData !== null;
            let defaultType = forceType || 'node'; // 'node' or 'gateway'

            const defaultId = isEdit ? (editData.dev_eui || editData.gateway_id) : '';
            const defaultName = isEdit ? (editData.name || '') : '';
            const defaultRange = isEdit ? editData.range : '';
            const defaultAltitude = isEdit ? (editData.altitude || 0) : 0;

            // Radio toggle UI for new components
            const typeSelectionUI = !isEdit ? `
            <div style="margin-bottom: 10px;">
                <label><input type="radio" name="itemType" value="node" checked onchange="document.getElementById('idLabel').innerText='Device EUI:'"> Node</label>
                <label style="margin-left: 15px;"><input type="radio" name="itemType" value="gateway" onchange="document.getElementById('idLabel').innerText='Gateway ID:'"> Gateway</label>
            </div>
        ` : `<div style="margin-bottom: 10px; font-weight: bold; color: ${defaultType === 'node' ? 'purple' : 'green'};">${defaultType === 'node' ? 'Node' : 'Gateway'}</div>`;

            const popupContent = `
            <div style="font-family: Arial, sans-serif; font-size: 14px;">
                <h3 style="margin-top: 0;">${isEdit ? 'Edit Map Item' : 'Add to Map'}</h3>
                ${typeSelectionUI}

                ${!isEdit ? `
                <label><b id="idLabel">Device EUI:</b></label><br>
                <input type="text" id="itemId" placeholder="e.g. 0011223344556677" style="width: 100%; margin-bottom: 10px;" value="${defaultId}"><br>
                ` : `<div style="margin-bottom: 10px;"><b>ID:</b> ${defaultId}</div>`}
                
                <label><b>Name:</b></label><br>
                <input type="text" id="itemName" placeholder="e.g. Campus Roof" style="width: 100%; margin-bottom: 10px;" value="${defaultName}"><br>
                
                <label><b>Range (meters):</b></label><br>
                <input type="number" id="itemRange" placeholder="e.g. 5000" style="width: 100%; margin-bottom: 10px;" value="${defaultRange}"><br>

                <label><b>Altitude (meters, optional):</b></label><br>
                <input type="number" id="itemAltitude" placeholder="e.g. 10" style="width: 100%; margin-bottom: 15px;" value="${defaultAltitude}"><br>
                
                <button id="saveItemBtn" style="padding: 5px 10px; cursor: pointer;">${isEdit ? 'Save Changes' : 'Save Item'}</button>
                ${isEdit ? `<button onclick="window.currentEditId = null; window.currentEditType = null; map.closePopup();" style="padding: 5px 10px; cursor: pointer; float:right;">Cancel</button>` : ''}
            </div>
        `;

            const popup = L.popup()
                .setLatLng([lat, lng])
                .setContent(popupContent)
                .openOn(map);

            setTimeout(() => {
                const btn = document.getElementById('saveItemBtn');
                if (btn) {
                    btn.addEventListener('click', () => {
                        let type = defaultType;
                        if (!isEdit) {
                            const selector = document.querySelector('input[name="itemType"]:checked');
                            if (selector) type = selector.value;
                        }

                        const idVal = isEdit ? defaultId : document.getElementById('itemId').value;
                        const name = document.getElementById('itemName').value;
                        const range = document.getElementById('itemRange').value;
                        const altitude = document.getElementById('itemAltitude').value || 0;

                        if (!idVal || !range) {
                            alert("ID and Range are required!");
                            return;
                        }

                        const payload = {
                            name: name,
                            latitude: lat,
                            longitude: lng,
                            altitude: parseFloat(altitude),
                            range: range
                        };

                        if (type === 'node') payload.dev_eui = idVal;
                        if (type === 'gateway') payload.gateway_id = idVal;

                        const endpoint = type === 'node' ? (isEdit ? `/nodes/${idVal}` : '/nodes') : (isEdit ? `/gateways/${idVal}` : '/gateways');
                        const method = isEdit ? 'PUT' : 'POST';

                        fetch(endpoint, {
                            method: method,
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(payload)
                        })
                            .then(response => response.json())
                            .then(data => {
                                if (data.status === 'ok') {
                                    if (isEdit) {
                                        // Update existing
                                        const arr = type === 'node' ? nodesData : gatewaysData;
                                        const key = type === 'node' ? 'dev_eui' : 'gateway_id';
                                        const idx = arr.findIndex(n => n[key] === idVal);
                                        if (idx !== -1) arr[idx] = payload;
                                        currentEditId = null;
                                        currentEditType = null;
                                    } else {
                                        // Push new
                                        if (type === 'node') nodesData.push(payload);
                                        if (type === 'gateway') gatewaysData.push(payload);
                                    }

                                    // Re-fetch nodes to sync connected_gateway values cleanly since DB calculates it automatically
                                    refreshConnections();

                                    if (type === 'gateway') drawGateway(payload);

                                    map.closePopup();
                                } else {
                                    alert(`Failed to ${isEdit ? 'update' : 'add'} ${type}: ` + data.message);
                                }
                            })
                            .catch(error => {
                                console.error(`Error saving ${type}:`, error);
                                alert("An error occurred. Check the console.");
                            });
                    });
                }
            }, 100);
        }

        // Add click event to map to place/move a node or gateway
        map.on('click', function (e) {
            const lat = e.latlng.lat;
            const lng = e.latlng.lng;

            if (currentEditId !== null && currentEditType !== null) {
                // Just close the config window and reset edit state
                currentEditId = null;
                currentEditType = null;
            } else {
                // Adding a brand new item
                openFormPopup(lat, lng, null, null);
            }
        });

        // --- User Geolocation Feature --- Removed

        // Add sidebar toggle control button
        L.Control.SidebarToggle = L.Control.extend({
            options: {
                position: 'topright'
            },
            onAdd: function (map) {
                const container = L.DomUtil.create('div', 'leaflet-bar leaflet-control leaflet-control-sidebar-toggle');
                container.innerHTML = '☰'; // Hamburger menu icon
                container.title = "Toggle Nodes Sidebar";

                container.onclick = function (e) {
                    e.stopPropagation();
                    toggleSidebar();
                }
                return container;
            }
        });

        map.addControl(new L.Control.SidebarToggle());

    </script>
</body>

</html>
