<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIVS Gateway - Node Map</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <!-- Leaflet Geocoder CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <!-- Google Fonts Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #0f172a;
        }

        #map-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        #map {
            height: 100%;
            width: 100%;
            background: #1e293b;
        }

        /* Custom map control for sidebar */
        .leaflet-control-sidebar-toggle {
            background-color: white;
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            cursor: pointer;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background-clip: padding-box;
        }

        .leaflet-control-sidebar-toggle:hover {
            background-color: #f4f4f4;
        }

        /* Sidebar styling */

        #sidebar {
            position: absolute;
            top: 0;
            right: -300px;
            width: 300px;
            height: 100vh;
            background: white;
            box-shadow: -2px 0 5px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            transition: right 0.3s;
            display: flex;
            flex-direction: column;
        }

        #sidebar.open {
            right: 0;
        }

        .sidebar-header {
            padding: 15px;
            background: #2196F3;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-close {
            cursor: pointer;
            font-size: 20px;
        }

        .node-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .node-item {
            background: #f9f9f9;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 11px;
        }

        button.action-btn {
            padding: 3px 6px;
        }

        .leaflet-popup-content {
            font-size: 14px;
        }

        .node-item h4 {
            margin: 0 0 5px 0;
            font-size: 14px;
        }

        .node-actions {
            display: flex;
            gap: 5px;
            margin-top: 8px;
        }

        .node-actions button {
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid #ccc;
            background: white;
            border-radius: 3px;
        }

        .node-actions button:hover {
            background: #eee;
        }

        /* Tooltip styling */
        .node-tooltip {
            background: transparent;
            border: none;
            box-shadow: none;
            font-weight: bold;
            color: #333;
            text-shadow: 1px 1px 2px white, -1px -1px 2px white, 1px -1px 2px white, -1px 1px 2px white;
        }

        /* Pulsating Aircraft Radar Blob styles */
        .aircraft-pulse-icon {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .radar-pulse-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            z-index: 2;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        .radar-pulse-ring {
            position: absolute;
            width: 32px;
            height: 32px;
            border: 2px solid;
            border-radius: 50%;
            animation: radar-pulsate 1.8s ease-out infinite;
            opacity: 0;
            z-index: 1;
            transition: border-color 0.3s ease;
        }

        @keyframes radar-pulsate {
            0% {
                transform: scale(0.3);
                opacity: 0.8;
            }

            80% {
                transform: scale(1.2);
                opacity: 0;
            }

            100% {
                transform: scale(1.2);
                opacity: 0;
            }
        }

        /* ADS-B aircraft markers */
        .adsb-aircraft-icon {
            transition: transform 0.3s ease;
            cursor: pointer;
            line-height: 0;
        }

        .adsb-aircraft-icon svg {
            display: block;
            width: 100%;
            height: 100%;
        }

        .adsb-aircraft-icon.ground {
            opacity: 0.5;
        }

        .adsb-callsign-tooltip {
            background: rgba(0, 0, 0, 0.75);
            border: none;
            color: #fff;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 3px;
            box-shadow: none;
            letter-spacing: 0.5px;
        }

        .adsb-callsign-tooltip::before {
            border: none;
        }

        /* ─── ADS-B Detail Panel (adsb.lol style) ─── */
        #adsb-detail-panel {
            position: absolute;
            top: 0;
            left: -320px;
            width: 300px;
            height: 100vh;
            background: rgba(15, 20, 35, 0.94);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 1001;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 24px rgba(0, 0, 0, 0.5);
            border-right: 1px solid rgba(255, 255, 255, 0.06);
            overflow-y: auto;
            overflow-x: hidden;
            font-size: 12px;
            color: #c8d6e5;
        }

        #adsb-detail-panel.open {
            left: 0;
        }

        .adp-header {
            padding: 12px 14px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
        }

        .adp-close {
            position: absolute;
            top: 10px;
            right: 12px;
            width: 22px;
            height: 22px;
            cursor: pointer;
            color: #94a3b8;
            font-size: 16px;
            line-height: 22px;
            text-align: center;
            border-radius: 3px;
            transition: all 0.15s;
        }

        .adp-close:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
        }

        .adp-callsign {
            font-size: 20px;
            font-weight: 700;
            color: #f1f5f9;
            letter-spacing: 1px;
        }

        .adp-subtitle {
            font-size: 11px;
            color: #64748b;
            margin-top: 2px;
        }

        .adp-section-title {
            background: rgba(255, 255, 255, 0.04);
            padding: 4px 14px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #64748b;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .adp-section {
            padding: 6px 14px;
        }

        .adp-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .adp-row:last-child {
            border-bottom: none;
        }

        .adp-label {
            color: #94a3b8;
            font-size: 11px;
            flex-shrink: 0;
        }

        .adp-value {
            color: #e2e8f0;
            font-weight: 500;
            text-align: right;
            font-size: 12px;
        }

        .adp-route-row {
            padding: 6px 14px;
            text-align: center;
        }

        .adp-route-airports {
            font-size: 16px;
            font-weight: 700;
            color: #f1f5f9;
            letter-spacing: 2px;
        }

        .adp-route-arrow {
            color: #3b82f6;
            margin: 0 6px;
        }

        .adp-route-loading {
            color: #475569;
            font-size: 11px;
            font-style: italic;
        }

        .adp-links {
            padding: 8px 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .adp-links a {
            color: #3b82f6;
            text-decoration: none;
            font-size: 11px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .adp-links a:hover {
            text-decoration: underline;
            color: #60a5fa;
        }

        /* ─── Right-click Context Menu ─── */
        .map-context-menu {
            position: absolute;
            z-index: 10000;
            background: rgba(15, 23, 42, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 6px 0;
            min-width: 180px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.04);
            font-family: 'Inter', sans-serif;
            animation: ctxFadeIn 0.12s ease-out;
        }

        @keyframes ctxFadeIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(-4px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .ctx-menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 16px;
            cursor: pointer;
            color: #e2e8f0;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.1s;
            user-select: none;
        }

        .ctx-menu-item:hover {
            background: rgba(59, 130, 246, 0.18);
        }

        .ctx-menu-item .ctx-icon {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
        }

        .ctx-menu-separator {
            height: 1px;
            background: rgba(255, 255, 255, 0.06);
            margin: 4px 8px;
        }

        .ctx-menu-coords {
            padding: 4px 16px 6px;
            font-size: 10px;
            color: #475569;
            font-family: 'Inter', monospace;
            letter-spacing: 0.3px;
        }

        /* ─── Modern Form Popup (replaces Leaflet default) ─── */
        .modern-form-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 10001;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: overlayIn 0.15s ease-out;
        }

        @keyframes overlayIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .modern-form-card {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 0;
            width: 340px;
            max-width: 90vw;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.5);
            font-family: 'Inter', sans-serif;
            color: #e2e8f0;
            animation: cardIn 0.2s ease-out;
            overflow: hidden;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: scale(0.92) translateY(12px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .mf-header {
            padding: 16px 20px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .mf-title {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .mf-close {
            color: #64748b;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            transition: color 0.15s;
        }

        .mf-close:hover {
            color: #f87171;
        }

        .mf-type-toggle {
            display: flex;
            padding: 12px 20px 0;
            gap: 8px;
        }

        .mf-type-btn {
            flex: 1;
            padding: 8px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: transparent;
            color: #94a3b8;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .mf-type-btn.active {
            background: rgba(59, 130, 246, 0.18);
            border-color: rgba(59, 130, 246, 0.4);
            color: #60a5fa;
        }

        .mf-type-btn:hover:not(.active) {
            border-color: rgba(255, 255, 255, 0.2);
            color: #cbd5e1;
        }

        .mf-body {
            padding: 16px 20px;
        }

        .mf-field {
            margin-bottom: 12px;
        }

        .mf-field label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 4px;
        }

        .mf-field input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.04);
            color: #e2e8f0;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.15s;
            box-sizing: border-box;
        }

        .mf-field input:focus {
            border-color: rgba(59, 130, 246, 0.5);
        }

        .mf-field input::placeholder {
            color: #475569;
        }

        .mf-actions {
            padding: 0 20px 16px;
            display: flex;
            gap: 8px;
        }

        .mf-btn-save {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: opacity 0.15s;
        }

        .mf-btn-save:hover {
            opacity: 0.9;
        }

        .mf-btn-cancel {
            padding: 10px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: transparent;
            color: #94a3b8;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.15s;
        }

        .mf-btn-cancel:hover {
            border-color: rgba(255, 255, 255, 0.2);
            color: #e2e8f0;
        }

        /* ─── Altitude Legend Bar ─── */
        .altitude-legend {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 0;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            padding: 6px 14px;
            font-family: 'Inter', sans-serif;
            pointer-events: none;
        }

        .alt-legend-bar {
            width: 260px;
            height: 10px;
            border-radius: 5px;
            background: linear-gradient(to right,
                #4ade80 0%,
                #a3e635 12%,
                #facc15 25%,
                #fb923c 42%,
                #f87171 58%,
                #e879f9 75%,
                #a78bfa 88%,
                #60a5fa 100%);
        }

        .alt-legend-labels {
            display: flex;
            justify-content: space-between;
            width: 260px;
            margin-top: 2px;
        }

        .alt-legend-labels span {
            font-size: 8px;
            color: #94a3b8;
            font-weight: 500;
        }

        .alt-legend-title {
            font-size: 9px;
            color: #64748b;
            font-weight: 600;
            margin-right: 10px;
            white-space: nowrap;
        }

        /* ─── Device Detail Panel (mirrors ADS-B panel) ─── */
        #device-detail-panel {
            position: absolute;
            top: 0;
            left: -320px;
            width: 300px;
            height: 100vh;
            background: rgba(15, 20, 35, 0.94);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 1001;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 24px rgba(0, 0, 0, 0.5);
            border-right: 1px solid rgba(255, 255, 255, 0.06);
            overflow-y: auto;
            overflow-x: hidden;
            font-size: 12px;
            color: #c8d6e5;
        }

        #device-detail-panel.open {
            left: 0;
        }

        .ddp-actions {
            padding: 10px 14px;
            display: flex;
            gap: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .ddp-btn {
            flex: 1;
            padding: 8px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: transparent;
            color: #94a3b8;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .ddp-btn:hover {
            border-color: rgba(255, 255, 255, 0.2);
            color: #cbd5e1;
        }

        .ddp-btn-save {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-color: transparent;
            color: white;
        }

        .ddp-btn-save:hover {
            opacity: 0.9;
            color: white;
        }

        .ddp-btn-delete {
            border-color: rgba(239, 68, 68, 0.3);
            color: #f87171;
        }

        .ddp-btn-delete:hover {
            background: rgba(239, 68, 68, 0.12);
            border-color: rgba(239, 68, 68, 0.5);
        }

        .ddp-edit-input {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(59, 130, 246, 0.4);
            border-radius: 4px;
            color: #e2e8f0;
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            padding: 3px 6px;
            outline: none;
            width: 100px;
            transition: border-color 0.15s;
        }

        .ddp-edit-input:focus {
            border-color: rgba(59, 130, 246, 0.7);
        }

        .ddp-edit-input[type="number"] {
            width: 70px;
        }
    </style>
</head>

<body>

    <div id="map-container">
        <div id="map"></div>

        <!-- ADS-B Aircraft Detail Panel (adsb.lol style) -->
        <div id="adsb-detail-panel">
            <div class="adp-header">
                <div class="adp-close" id="adp-close-btn">✕</div>
                <div class="adp-callsign" id="adp-callsign">—</div>
                <div class="adp-subtitle" id="adp-subtitle">—</div>
            </div>

            <div class="adp-section-title">Registration</div>
            <div class="adp-section">
                <div class="adp-row"><span class="adp-label">ICAO Hex</span><span class="adp-value"
                        id="adp-hex">—</span></div>
                <div class="adp-row"><span class="adp-label">Reg.</span><span class="adp-value" id="adp-reg">—</span>
                </div>
                <div class="adp-row"><span class="adp-label">Type</span><span class="adp-value" id="adp-type">—</span>
                </div>
                <div class="adp-row"><span class="adp-label">Squawk</span><span class="adp-value"
                        id="adp-squawk">—</span></div>
            </div>

            <div class="adp-section-title">Route</div>
            <div class="adp-route-row" id="adp-route-container">
                <span class="adp-route-loading" id="adp-route-text">Click an aircraft...</span>
            </div>

            <div id="adp-photo-container" style="padding: 0; display: none;">
                <img id="adp-photo" src="" alt="Aircraft photo"
                    style="width: 100%; display: block; border-top: 1px solid rgba(255,255,255,0.06); border-bottom: 1px solid rgba(255,255,255,0.06);">
                <div id="adp-photo-credit" style="padding: 2px 14px 4px; font-size: 9px; color: #475569;"></div>
            </div>

            <div class="adp-section-title">Spatial</div>
            <div class="adp-section">
                <div class="adp-row"><span class="adp-label">Groundspeed</span><span class="adp-value"
                        id="adp-speed">—</span></div>
                <div class="adp-row"><span class="adp-label">Baro. Altitude</span><span class="adp-value"
                        id="adp-alt">—</span></div>
                <div class="adp-row"><span class="adp-label">Vert. Rate</span><span class="adp-value"
                        id="adp-vrate">—</span></div>
                <div class="adp-row"><span class="adp-label">Track</span><span class="adp-value" id="adp-track">—</span>
                </div>
                <div class="adp-row"><span class="adp-label">Position</span><span class="adp-value"
                        id="adp-pos">—</span></div>
            </div>

            <div class="adp-section-title">Signal</div>
            <div class="adp-section">
                <div class="adp-row"><span class="adp-label">Source</span><span class="adp-value"
                        id="adp-source">—</span></div>
                <div class="adp-row"><span class="adp-label">RSSI</span><span class="adp-value" id="adp-rssi">—</span>
                </div>
                <div class="adp-row"><span class="adp-label">Messages</span><span class="adp-value"
                        id="adp-msgs">—</span></div>
            </div>

            <div class="adp-links">
                <a id="adp-globe-link" href="#" target="_blank" rel="noopener">🌐 View on adsb.lol</a>
            </div>
        </div>

        <!-- Device Detail Panel (Node/Gateway) -->
        <div id="device-detail-panel">
            <div class="adp-header">
                <div class="adp-close" id="ddp-close-btn">✕</div>
                <div class="adp-callsign" id="ddp-name">—</div>
                <div class="adp-subtitle" id="ddp-subtitle">—</div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>

    <!-- tar1090-style embedded aircraft shapes -->

    <script>
        // Initialize the map, centered on specific coordinates
        const worldBounds = [
            [-90, -180],
            [90, 180]
        ];

        const map = L.map('map', {
            maxBounds: worldBounds,
            maxBoundsViscosity: 1.0 // Prevents dragging completely outside the bounds
        }).setView([41.4, -7.8], 8);

        // Calculate and set the minimum zoom required to fit the bounds
        map.setMinZoom(map.getBoundsZoom(worldBounds, true));

        // Update minZoom dynamically if window is resized
        window.addEventListener('resize', function () {
            map.setMinZoom(map.getBoundsZoom(worldBounds, true));
        });

        // ─── Base map layers ────────────────────────────────────────
        const streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            noWrap: true,
            bounds: worldBounds,
            attribution: '© OpenStreetMap contributors'
        });

        const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 18,
            noWrap: true,
            bounds: worldBounds,
            attribution: 'Tiles © Esri — Source: Esri, Maxar, Earthstar Geographics'
        });

        const topoLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
            maxZoom: 17,
            noWrap: true,
            bounds: worldBounds,
            attribution: '© OpenTopoMap (CC-BY-SA)'
        });

        const darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 20,
            noWrap: true,
            bounds: worldBounds,
            subdomains: 'abcd',
            attribution: '© CARTO'
        });

        // Restore saved map type preference or default to Street
        const baseMaps = {
            '🗺️ Street': streetLayer,
            '🛰️ Satellite': satelliteLayer,
            '⛰️ Topographic': topoLayer,
            '🌙 Dark': darkLayer
        };
        const savedMapType = localStorage.getItem('divs_map_type') || '🗺️ Street';
        (baseMaps[savedMapType] || streetLayer).addTo(map);

        // ─── ADS-B aircraft overlay layer ─────────────────────────
        const adsbLayerGroup = L.layerGroup();
        const adsbEnabled = localStorage.getItem('divs_adsb_enabled') !== 'false';
        if (adsbEnabled) adsbLayerGroup.addTo(map);

        const overlayMaps = {
            '✈️ ADS-B Aircraft': adsbLayerGroup
        };

        // Add layer control selector (top-right) with base + overlay
        L.control.layers(baseMaps, overlayMaps, { position: 'topright' }).addTo(map);

        // Persist the user's map type selection
        map.on('baselayerchange', function (e) {
            localStorage.setItem('divs_map_type', e.name);
        });

        // Persist ADS-B overlay toggle
        map.on('overlayadd', function (e) {
            if (e.name === '✈️ ADS-B Aircraft') {
                localStorage.setItem('divs_adsb_enabled', 'true');
                fetchAdsbData(); // Immediate refresh on enable
            }
        });
        map.on('overlayremove', function (e) {
            if (e.name === '✈️ ADS-B Aircraft') {
                localStorage.setItem('divs_adsb_enabled', 'false');
            }
        });

        // ─── ADS-B Live Aircraft Tracking ─────────────────────────
        const adsbMarkers = {};  // hex -> { marker }
        let activeTrackPolyline = null;  // currently displayed OpenSky track
        let adsbFetchTimer = null;
        const ADSB_POLL_INTERVAL = 10000; // 10 seconds
        const ADSB_RADIUS_NM = 100;       // nautical miles
        let selectedAircraftHex = null;   // hex of currently selected aircraft

        // Smooth altitude → color gradient (tar1090 style)
        // GND → green → yellow → orange → red → pink → purple → blue
        function getAltitudeColor(altBaro) {
            if (altBaro === 'ground' || altBaro == null) return '#888';
            const alt = parseInt(altBaro);
            if (isNaN(alt)) return '#888';
            // Clamp to 0..45000 range
            const t = Math.max(0, Math.min(alt / 45000, 1));
            // Gradient stops matching the legend bar
            const stops = [
                [0.00, [74, 222, 128]],   // #4ade80 green
                [0.12, [163, 230, 53]],   // #a3e635 lime
                [0.25, [250, 204, 21]],   // #facc15 yellow
                [0.42, [251, 146, 60]],   // #fb923c orange
                [0.58, [248, 113, 113]],  // #f87171 red
                [0.75, [232, 121, 249]],  // #e879f9 pink
                [0.88, [167, 139, 250]],  // #a78bfa purple
                [1.00, [96, 165, 250]],   // #60a5fa blue
            ];
            // Find the two stops we're between
            let i = 0;
            for (; i < stops.length - 1; i++) {
                if (t <= stops[i + 1][0]) break;
            }
            const [t0, c0] = stops[i];
            const [t1, c1] = stops[Math.min(i + 1, stops.length - 1)];
            const f = t0 === t1 ? 0 : (t - t0) / (t1 - t0);
            const r = Math.round(c0[0] + f * (c1[0] - c0[0]));
            const g = Math.round(c0[1] + f * (c1[1] - c0[1]));
            const b = Math.round(c0[2] + f * (c1[2] - c0[2]));
            return `rgb(${r},${g},${b})`;
        }

        function formatAltitude(altBaro) {
            if (altBaro === 'ground') return 'Ground';
            if (altBaro == null) return '—';
            return parseInt(altBaro).toLocaleString() + ' ft';
        }

        // ─── Aircraft Icon System (tar1090 markers.js) ───
        // Uses shapes, TypeDesignatorIcons, CategoryIcons, getBaseMarker, svgShapeToSVG
        // from aircraft_shapes.js — exact same logic as tar1090
        const BASE_ICON_SCALE = 1.0;   // global scale multiplier

        // Resolve type code to [shapeName, scale] using tar1090's full lookup chain
        function resolveAircraftShape(ac) {
            const typeCode = (ac.t || '').toUpperCase();
            const category = ac.category || null;
            const isGround = ac.alt_baro === 'ground';
            // tar1090's getBaseMarker(category, typeDesignator, typeDescription, wtc, addrtype, altitude, eastbound)
            // We don't have typeDescription or wtc from the adsb.lol API, so pass null
            return getBaseMarker(category, typeCode, null, null, null, isGround ? 'ground' : null, null);
        }

        // Build the SVG HTML string using tar1090's svgShapeToSVG
        function buildAircraftSvg(ac, color) {
            const [shapeName, scale] = resolveAircraftShape(ac);
            const shape = shapes[shapeName] || shapes['unknown'];
            // svgShapeToSVG(shape, fillColor, strokeColor, strokeWidth, scale)
            return svgShapeToSVG(shape, color, '#000', outlineWidth * 0.7, scale * BASE_ICON_SCALE);
        }

        // Get icon pixel dimensions from shape + scale
        function getIconSize(ac) {
            const [shapeName, scale] = resolveAircraftShape(ac);
            const shape = shapes[shapeName] || shapes['unknown'];
            const s = scale * BASE_ICON_SCALE;
            return [Math.round(shape.w * s), Math.round(shape.h * s)];
        }

        // ─── Detail Panel + Route Logic ───
        let routePolyline = null;      // dotted line to destination airport
        let routeDestination = null;   // [lat, lon] of destination for live updates
        let selectedAcData = null;     // currently displayed aircraft data

        function showDetailPanel(ac) {
            selectedAcData = ac;
            const panel = document.getElementById('adsb-detail-panel');

            // Close device panel if open
            hideDevicePanel();

            // Update all data fields
            updateDetailPanelData(ac);

            // Reset route to loading
            document.getElementById('adp-route-text').textContent = 'Loading route...';
            document.getElementById('adp-route-text').className = 'adp-route-loading';

            // Reset photo
            document.getElementById('adp-photo-container').style.display = 'none';
            document.getElementById('adp-photo').src = '';
            document.getElementById('adp-photo-credit').textContent = '';

            panel.classList.add('open');

            // Fetch route info (only on initial click, not on refresh)
            fetchRoute(ac);

            // Fetch aircraft photo from planespotters.net
            fetchAircraftPhoto(ac.hex);
        }

        // Update panel data without re-fetching route or photo
        function updateDetailPanelData(ac) {
            const callsign = (ac.flight || '').trim() || '—';
            const reg = ac.r || '—';
            const type = ac.t || '—';
            const hex = ac.hex.toUpperCase();
            const alt = formatAltitude(ac.alt_baro);
            const altMetric = (ac.alt_baro != null && ac.alt_baro !== 'ground')
                ? ` <span style="color:#64748b;font-size:11px">(${Math.round(parseInt(ac.alt_baro) * 0.3048).toLocaleString()} m)</span>` : '';
            const gs = ac.gs != null ? Math.round(ac.gs) + ' kts' : '—';
            const gsMetric = ac.gs != null
                ? ` <span style="color:#64748b;font-size:11px">(${Math.round(ac.gs * 1.852)} km/h)</span>` : '';
            const squawk = ac.squawk || '—';
            const heading = ac.track != null ? Math.round(ac.track) + '°' : '—';
            const vr = ac.baro_rate != null ? (ac.baro_rate > 0 ? '▲ +' : '▼ ') + ac.baro_rate + ' ft/m' : '—';
            const vrMetric = ac.baro_rate != null
                ? ` <span style="color:#64748b;font-size:11px">(${Math.round(ac.baro_rate * 0.3048)} m/m)</span>` : '';
            const pos = (ac.lat != null && ac.lon != null) ? `${ac.lat.toFixed(4)}, ${ac.lon.toFixed(4)}` : '—';
            const source = ac.type || '—';
            const rssi = ac.rssi != null ? ac.rssi.toFixed(1) + ' dBFS' : '—';
            const msgs = ac.messages != null ? ac.messages.toLocaleString() : '—';

            document.getElementById('adp-callsign').textContent = callsign;
            document.getElementById('adp-subtitle').textContent = `${type} · ${reg}`;
            document.getElementById('adp-hex').textContent = hex;
            document.getElementById('adp-reg').textContent = reg;
            document.getElementById('adp-type').textContent = type;
            document.getElementById('adp-squawk').textContent = squawk;
            document.getElementById('adp-speed').innerHTML = gs + gsMetric;
            document.getElementById('adp-alt').innerHTML = alt + altMetric;
            document.getElementById('adp-vrate').innerHTML = vr + vrMetric;
            document.getElementById('adp-track').textContent = heading;
            document.getElementById('adp-pos').textContent = pos;
            document.getElementById('adp-source').textContent = source;
            document.getElementById('adp-rssi').textContent = rssi;
            document.getElementById('adp-msgs').textContent = msgs;
            document.getElementById('adp-globe-link').href = `https://adsb.lol/?icao=${ac.hex}`;
        }

        // Fetch aircraft photo from planespotters.net public API
        function fetchAircraftPhoto(hex) {
            fetch(`https://api.planespotters.net/pub/photos/hex/${hex}`)
                .then(r => r.json())
                .then(data => {
                    if (!selectedAcData || selectedAcData.hex !== hex) return;
                    if (data.photos && data.photos.length > 0) {
                        const photo = data.photos[0];
                        const imgUrl = photo.thumbnail_large?.src || photo.thumbnail?.src;
                        if (imgUrl) {
                            const imgEl = document.getElementById('adp-photo');
                            imgEl.src = imgUrl;
                            document.getElementById('adp-photo-container').style.display = 'block';
                            const credit = photo.photographer || '';
                            const link = photo.link || '';
                            document.getElementById('adp-photo-credit').innerHTML = credit
                                ? `📷 <a href="${link}" target="_blank" rel="noopener" style="color: #64748b; text-decoration: none;">${credit}</a>`
                                : '';
                        }
                    }
                })
                .catch(() => { /* silently fail if no photo */ });
        }

        function hideDetailPanel() {
            document.getElementById('adsb-detail-panel').classList.remove('open');
            selectedAcData = null;
            routeDestination = null;
            clearRoutePolyline();
        }

        function clearRoutePolyline() {
            if (routePolyline) {
                adsbLayerGroup.removeLayer(routePolyline);
                routePolyline = null;
            }
        }

        // Panel close handler
        document.getElementById('adp-close-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            hideDetailPanel();
        });

        // Route fetching via adsb.lol routeset API
        function fetchRoute(ac) {
            const callsign = (ac.flight || '').trim();
            if (!callsign || ac.lat == null || ac.lon == null) {
                document.getElementById('adp-route-text').textContent = 'No route data';
                return;
            }

            // Store destination for live route-line updates
            const reqBody = { planes: [{ callsign: callsign, lat: ac.lat, lon: ac.lon }] };
            console.log('[Route] Fetching route for', callsign, reqBody);

            fetch('/api/adsb/routeset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(reqBody)
            })
                .then(res => {
                    console.log('[Route] Response status:', res.status);
                    return res.json();
                })
                .then(data => {
                    console.log('[Route] Response data:', JSON.stringify(data).substring(0, 500));
                    if (!selectedAcData || selectedAcData.hex !== ac.hex) return; // stale

                    // Parse the route response
                    let routeStr = null;
                    let destLat = null, destLon = null;

                    // Try multiple response formats
                    let routeEntry = null;
                    if (Array.isArray(data) && data.length > 0) {
                        routeEntry = data[0];
                    } else if (data && typeof data === 'object' && !Array.isArray(data)) {
                        routeEntry = data;
                    }

                    if (routeEntry) {
                        // Format 1: _airports array
                        const airports = routeEntry._airports || routeEntry.airports;
                        if (airports && airports.length >= 2) {
                            const orig = airports[0];
                            const dest = airports[airports.length - 1];
                            routeStr = `<span class="adp-route-airports">${orig.icao || orig.iata || '?'}<span class="adp-route-arrow"> → </span>${dest.icao || dest.iata || '?'}</span>`;
                            if (dest.lat != null && dest.lon != null) {
                                destLat = dest.lat;
                                destLon = dest.lon;
                            }
                        } else if (airports && airports.length === 1) {
                            routeStr = airports[0].icao || airports[0].iata || 'Unknown';
                        }
                        // Format 2: route string
                        if (!routeStr && (routeEntry.route || routeEntry._route)) {
                            routeStr = `<span class="adp-route-airports">${routeEntry.route || routeEntry._route}</span>`;
                        }
                    }

                    const routeEl = document.getElementById('adp-route-text');
                    if (routeStr) {
                        routeEl.innerHTML = routeStr;
                        routeEl.className = '';
                    } else {
                        routeEl.textContent = 'No route data';
                        routeEl.className = 'adp-route-loading';
                    }

                    // Draw dotted line to destination + store dest for live updates
                    clearRoutePolyline();
                    routeDestination = (destLat != null && destLon != null) ? [destLat, destLon] : null;
                    if (routeDestination && ac.lat != null && ac.lon != null) {
                        routePolyline = L.polyline(
                            [[ac.lat, ac.lon], routeDestination],
                            { color: '#9ca3af', weight: 1.5, opacity: 0.6, dashArray: '4, 6', interactive: false }
                        );
                        adsbLayerGroup.addLayer(routePolyline);
                    }
                })
                .catch(err => {
                    console.error('[Route] Fetch error:', err);
                    if (selectedAcData && selectedAcData.hex === ac.hex) {
                        document.getElementById('adp-route-text').textContent = 'Route unavailable';
                        document.getElementById('adp-route-text').className = 'adp-route-loading';
                    }
                });
        }

        let trackSegments = []; // colored trail segments
        let lastSelectedPos = null; // last known [lat, lon, alt_baro] of selected aircraft for live trail

        function clearTrack() {
            if (activeTrackPolyline) {
                adsbLayerGroup.removeLayer(activeTrackPolyline);
                activeTrackPolyline = null;
            }
            trackSegments.forEach(seg => adsbLayerGroup.removeLayer(seg));
            trackSegments = [];
            lastSelectedPos = null;
        }

        // Local position history for each aircraft (built from ADS-B polls)
        // Map of hex -> [{lat, lon, alt_baro, ts}, ...]
        const aircraftHistory = new Map();
        const MAX_HISTORY_POINTS = 500;

        function recordAircraftPositions(aircraftList) {
            const now = Date.now();
            aircraftList.forEach(ac => {
                if (ac.lat == null || ac.lon == null) return;
                if (!aircraftHistory.has(ac.hex)) {
                    aircraftHistory.set(ac.hex, []);
                }
                const hist = aircraftHistory.get(ac.hex);
                // Avoid duplicate points at the same location
                const last = hist.length > 0 ? hist[hist.length - 1] : null;
                if (last && last.lat === ac.lat && last.lon === ac.lon) return;
                hist.push({ lat: ac.lat, lon: ac.lon, alt_baro: ac.alt_baro, ts: now });
                // Cap history size
                if (hist.length > MAX_HISTORY_POINTS) hist.shift();
            });
        }

        function fetchAndShowTrack(icao24) {
            clearTrack();

            // First: draw trail from local position history (always available)
            const localHist = aircraftHistory.get(icao24);
            if (localHist && localHist.length >= 2) {
                console.log(`[Track] Drawing ${localHist.length} points from local history`);
                for (let i = 0; i < localHist.length - 1; i++) {
                    const p1 = localHist[i];
                    const p2 = localHist[i + 1];
                    const color = getAltitudeColor(p1.alt_baro);
                    const seg = L.polyline(
                        [[p1.lat, p1.lon], [p2.lat, p2.lon]],
                        { color: color, weight: 3, opacity: 0.85, interactive: false }
                    );
                    adsbLayerGroup.addLayer(seg);
                    trackSegments.push(seg);
                }
                // Set lastSelectedPos to the last local history point
                const lastPt = localHist[localHist.length - 1];
                lastSelectedPos = [lastPt.lat, lastPt.lon, lastPt.alt_baro];
            }

            // Then: try to fetch extended history from server (OpenSky/adsb.lol)
            // This will prepend older points if available
            fetch(`/api/adsb/track/${icao24}`)
                .then(res => {
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return res.json();
                })
                .then(data => {
                    if (!data.path || !Array.isArray(data.path) || data.path.length < 2) return;
                    console.log(`[Track] Got ${data.path.length} points from server, redrawing with full history`);
                    // Clear local-only trail and redraw with full server history
                    trackSegments.forEach(seg => adsbLayerGroup.removeLayer(seg));
                    trackSegments = [];
                    drawTraceSegments(data.path, false);
                })
                .catch(err => {
                    // Server fetch failed — local history trail is already drawn, that's fine
                    console.log(`[Track] Server fetch failed (${err.message}), using local history only`);
                });
        }

        // Draw colored trail segments from trace data
        // isGlobeFormat: true = alt in feet, false = server proxy (alt in meters)
        function drawTraceSegments(trace, isGlobeFormat) {
            for (let i = 0; i < trace.length - 1; i++) {
                const p1 = trace[i];
                const p2 = trace[i + 1];
                const lat1 = p1[1], lon1 = p1[2];
                const lat2 = p2[1], lon2 = p2[2];
                if (lat1 == null || lon1 == null || lat2 == null || lon2 == null) continue;

                // Server proxy format: altitude in meters at index 3
                const altFt = p1[3] != null ? Math.round(p1[3] * 3.28084) : null;
                const color = getAltitudeColor(altFt);
                const seg = L.polyline(
                    [[lat1, lon1], [lat2, lon2]],
                    { color: color, weight: 3, opacity: 0.85, interactive: false }
                );
                adsbLayerGroup.addLayer(seg);
                trackSegments.push(seg);
            }

            // Set lastSelectedPos to the last point for live appending
            const lastPt = trace[trace.length - 1];
            if (lastPt[1] != null && lastPt[2] != null) {
                const alt = lastPt[3] != null ? Math.round(lastPt[3] * 3.28084) : null;
                lastSelectedPos = [lastPt[1], lastPt[2], alt];
            }
            console.log(`[Track] Drew ${trackSegments.length} trail segments`);
        }

        function updateAdsbMarkers(aircraftList) {
            const seenHex = new Set();

            aircraftList.forEach(ac => {
                if (ac.lat == null || ac.lon == null) return;
                seenHex.add(ac.hex);

                const rotation = ac.track != null ? ac.track : 0;
                const isGround = ac.alt_baro === 'ground';
                const callsign = (ac.flight || '').trim();
                const color = getAltitudeColor(ac.alt_baro);

                if (adsbMarkers[ac.hex]) {
                    // Update existing marker position & rotation
                    const existing = adsbMarkers[ac.hex];
                    existing.marker.setLatLng([ac.lat, ac.lon]);
                    existing.acData = ac; // keep latest data
                    const el = existing.marker.getElement();
                    if (el) {
                        // Rotate the inner icon div, NOT the Leaflet marker container
                        // (Leaflet manages container's transform for translate3d positioning)
                        const innerDiv = el.querySelector('.adsb-aircraft-icon');
                        if (innerDiv) {
                            innerDiv.style.transform = `rotate(${rotation}deg)`;
                        }
                        const pathEl = el.querySelector('svg path');
                        if (pathEl) pathEl.setAttribute('fill', color);
                    }
                    if (callsign) existing.marker.setTooltipContent(callsign);
                    // Update detail panel DATA only if this is the selected aircraft
                    // (does NOT re-fetch route or photo — only updates position/speed/alt)
                    if (selectedAcData && selectedAcData.hex === ac.hex) {
                        selectedAcData = ac;
                        updateDetailPanelData(ac);
                        // Live-update the route polyline start point
                        if (routePolyline && routeDestination && ac.lat != null && ac.lon != null) {
                            routePolyline.setLatLngs([[ac.lat, ac.lon], routeDestination]);
                        }
                        // Live-append trail segment from last known position
                        if (lastSelectedPos && ac.lat != null && ac.lon != null) {
                            const [prevLat, prevLon, prevAlt] = lastSelectedPos;
                            // Only add segment if position actually changed
                            if (prevLat !== ac.lat || prevLon !== ac.lon) {
                                const segColor = getAltitudeColor(prevAlt != null ? prevAlt : ac.alt_baro);
                                const seg = L.polyline(
                                    [[prevLat, prevLon], [ac.lat, ac.lon]],
                                    { color: segColor, weight: 3, opacity: 0.85, interactive: false }
                                );
                                adsbLayerGroup.addLayer(seg);
                                trackSegments.push(seg);
                            }
                        }
                        // Update last known position
                        lastSelectedPos = [ac.lat, ac.lon, ac.alt_baro];
                    }
                } else {
                    // Create new marker with tar1090-style embedded SVG
                    const svgHtml = buildAircraftSvg(ac, color);
                    const iconSize = getIconSize(ac);
                    const [sName] = resolveAircraftShape(ac);
                    const noRotate = shapes[sName]?.noRotate || false;
                    const rot = noRotate ? 0 : rotation;
                    const icon = L.divIcon({
                        html: `<div class="adsb-aircraft-icon ${isGround ? 'ground' : ''}" style="transform:rotate(${rot}deg);width:${iconSize[0]}px;height:${iconSize[1]}px">${svgHtml}</div>`,
                        className: '',
                        iconSize: iconSize,
                        iconAnchor: [iconSize[0] / 2, iconSize[1] / 2]
                    });

                    const marker = L.marker([ac.lat, ac.lon], {
                        icon: icon,
                        interactive: true,
                        zIndexOffset: isGround ? -1000 : (ac.alt_baro || 0)
                    });

                    if (callsign) {
                        marker.bindTooltip(callsign, {
                            permanent: false,
                            direction: 'top',
                            offset: [0, -12],
                            className: 'adsb-callsign-tooltip'
                        });
                    }

                    // On click: show detail panel + fetch track
                    marker.on('click', function () {
                        const latestAc = adsbMarkers[ac.hex]?.acData || ac;
                        selectedAircraftHex = ac.hex;
                        showDetailPanel(latestAc);
                        // Set lastSelectedPos immediately so live trail starts from first update
                        if (latestAc.lat != null && latestAc.lon != null) {
                            lastSelectedPos = [latestAc.lat, latestAc.lon, latestAc.alt_baro];
                        }
                        fetchAndShowTrack(ac.hex);
                    });

                    adsbLayerGroup.addLayer(marker);
                    adsbMarkers[ac.hex] = { marker, acData: ac };
                }
            });

            // Remove markers for aircraft no longer in the response
            Object.keys(adsbMarkers).forEach(hex => {
                if (!seenHex.has(hex)) {
                    adsbLayerGroup.removeLayer(adsbMarkers[hex].marker);
                    delete adsbMarkers[hex];
                    // If the removed aircraft was selected, hide the panel
                    if (selectedAcData && selectedAcData.hex === hex) {
                        hideDetailPanel();
                    }
                }
            });
        }

        function fetchAdsbData() {
            if (!map.hasLayer(adsbLayerGroup)) return;

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.ac && Array.isArray(data.ac)) {

                        updateAdsbMarkers(data.ac);

                .catch(err => console.warn('ADS-B fetch error:', err));

        // =====================================================================

        // Triangulation state
        const activeDetections = [];
        const activeTriangulations = new Set();
        let AZIMUTH_UNCERTAINTY = 5.0; // Configurable ±degrees error envelope

        // Helper to handle 24h midnight rollover for seconds past midnight
        function getSecsDifference(t1, t2) {
            let diff = Math.abs(t1 - t2);
            if (diff > 43200) {

            }
            return diff;
        }

        function updateTimeWindow(val) {

        function rescheduleAircraftFadeOut() {
            if (!activeAircraftMarker) return; // No active aircraft to fade out

            // Clear any existing fadeout timeouts or intervals
            if (aircraftFadeTimeout) {
                clearTimeout(aircraftFadeTimeout);
                aircraftFadeTimeout = null;
            }
            if (aircraftFadeInterval) {
                clearInterval(aircraftFadeInterval);
                aircraftFadeInterval = null;
            }

            // Restore marker visibility to full
            const markerEl = activeAircraftMarker.getElement();
            if (markerEl) {
                markerEl.style.opacity = '1';
            }
            if (activeAircraftUncertainty) {
                activeAircraftUncertainty.setStyle({
                    opacity: 1.0,
                    fillOpacity: 0.08
                });
            }
            if (aircraftTrailPath) {
                aircraftTrailPath.setStyle({ opacity: CONFIG.TRAIL_PATH_OPACITY });
            }

            const elapsed = Date.now() - lastTriangulationTime;
            const remaining = Math.max(0, FADE_OUT_TIME_MS - elapsed);

            if (remaining <= 0) {
                // If it already expired, remove it immediately
                if (activeAircraftUncertainty) map.removeLayer(activeAircraftUncertainty);
                if (activeAircraftMarker) map.removeLayer(activeAircraftMarker);
                activeAircraftUncertainty = null;
                activeAircraftMarker = null;

                // Clear and remove trail circles
                aircraftTrail.forEach(pt => {
                    if (pt.circle) map.removeLayer(pt.circle);
                });
                aircraftTrail = [];

                // Remove trail polyline
                if (aircraftTrailPath) {
                    map.removeLayer(aircraftTrailPath);
                    aircraftTrailPath = null;
                }
            } else {
                // Start a new fadeout timeout
                aircraftFadeTimeout = setTimeout(() => {
                    let opacity = 1.0;
                    aircraftFadeInterval = setInterval(() => {
                        opacity -= 0.05;
                        if (opacity <= 0) {
                            clearInterval(aircraftFadeInterval);
                            aircraftFadeInterval = null;
                            if (activeAircraftUncertainty) map.removeLayer(activeAircraftUncertainty);
                            if (activeAircraftMarker) map.removeLayer(activeAircraftMarker);
                            activeAircraftUncertainty = null;
                            activeAircraftMarker = null;

                            // Clear and remove trail circles
                            aircraftTrail.forEach(pt => {
                                if (pt.circle) map.removeLayer(pt.circle);
                            });
                            aircraftTrail = [];

                            // Remove trail polyline
                            if (aircraftTrailPath) {
                                map.removeLayer(aircraftTrailPath);
                                aircraftTrailPath = null;
                            }
                        } else {
                            if (activeAircraftUncertainty) {
                                activeAircraftUncertainty.setStyle({ fillOpacity: opacity * CONFIG.BLOB_FILL_OPACITY, opacity: opacity });
                            }
                            if (activeAircraftMarker) {
                                const el = activeAircraftMarker.getElement();
                                if (el) el.style.opacity = opacity;
                            }
                            // Fade trail circles uniformly
                            aircraftTrail.forEach(pt => {

                            // Fade trail polyline
                            if (aircraftTrailPath) {
                                aircraftTrailPath.setStyle({ opacity: opacity * CONFIG.TRAIL_PATH_OPACITY });
                            }

        }

        function initSettings() {
            // Load Triangulation Window
            const savedTimeWindow = localStorage.getItem('triangulation_window_ms');

        // Initialize persisted settings
        initSettings();

        // Local flat-earth Mercator coordinate conversion helpers
        function latLngToLocalCartesian(lat, lon, lat_org, lon_org) {
            const R = 6378137.0; // Earth radius in meters
            const latRad = lat * Math.PI / 180;
            const latOrgRad = lat_org * Math.PI / 180;
            const lonRad = lon * Math.PI / 180;
            const lonOrgRad = lon_org * Math.PI / 180;

            const y = (latRad - latOrgRad) * R;
            const x = (lonRad - lonOrgRad) * R * Math.cos(latOrgRad);
            return { x, y };
        }

        function localCartesianToLatLng(x, y, lat_org, lon_org) {
            const R = 6378137.0;
            const latOrgRad = lat_org * Math.PI / 180;
            const latRad = latOrgRad + (y / R);
            const lonRad = (lon_org * Math.PI / 180) + (x / (R * Math.cos(latOrgRad)));
            return [latRad * 180 / Math.PI, lonRad * 180 / Math.PI];
        }

        // Ray Intersection Math using 2D Perp-Dot Products
        // Returns { x, y } in local meters, or null if parallel / invalid
        function getRayIntersection(x1, y1, az1, x2, y2, az2, range1, range2) {
            const rad1 = az1 * Math.PI / 180;
            const rad2 = az2 * Math.PI / 180;

            // Direction vectors (x: East, y: North)
            const ux = Math.sin(rad1);
            const uy = Math.cos(rad1);
            const vx = Math.sin(rad2);
            const vy = Math.cos(rad2);

            // Determinant
            const det = ux * vy - uy * vx;
            if (Math.abs(det) < 1e-6) {
                return null; // parallel or anti-parallel rays
            }

            // Ray parameter distance coefficients
            const t1 = ((x2 - x1) * vy - (y2 - y1) * vx) / det;
            const t2 = ((x2 - x1) * uy - (y2 - y1) * ux) / det;

            // Limit intersections to forward rays and within maximum range envelope
            const maxRange1 = (parseFloat(range1) || 5000) * 1.5;
            const maxRange2 = (parseFloat(range2) || 5000) * 1.5;

            if (t1 >= 0 && t2 >= 0 && t1 <= maxRange1 && t2 <= maxRange2) {
                return {
                    x: x1 + t1 * ux,
                    y: y1 + t1 * uy,
                    t1: t1,
                    t2: t2
                };
            }
            return null;
        }

        // Add a historical breadcrumb to the aircraft radar tracking trail
        function addTrailPoint(latLng, radius, color, activeLatLng) {
            // Prune trail points older than the configured blob lifetime
            pruneExpiredTrailPoints();

            // Create a Leaflet circle for this trail point — constant opacity,
            // no falloff.  Trail stays fully visible for its entire lifetime.
            const trailCircle = L.circle(latLng, {
                radius: radius,
                color: color,
                weight: 1,
                dashArray: '3, 4',
                fillColor: color,
                fillOpacity: CONFIG.TRAIL_CIRCLE_FILL_OPACITY,
                opacity: CONFIG.TRAIL_CIRCLE_OPACITY,
                interactive: false
            }).addTo(map);

            aircraftTrail.push({
                latLng: latLng,
                radius: radius,
                color: color,
                circle: trailCircle,
                createdAt: Date.now()
            });

            // Redraw the dashed polyline connecting all trail coordinates
            updateTrailPath(activeLatLng);
        }

        // Remove trail points that have exceeded the configured blob lifetime
        function pruneExpiredTrailPoints() {
            const now = Date.now();
            while (aircraftTrail.length > 0 && (now - aircraftTrail[0].createdAt) > FADE_OUT_TIME_MS) {
                const oldest = aircraftTrail.shift();
                if (oldest.circle) {
                    map.removeLayer(oldest.circle);
                }
            }
        }


        // Redraw the dashed polyline connecting all trail coordinates plus the active blob position
        function updateTrailPath(activeLatLng) {
            const pathCoords = aircraftTrail.map(pt => pt.latLng);
            if (activeLatLng) {
                pathCoords.push(activeLatLng);
            }

            if (aircraftTrailPath) {
                aircraftTrailPath.setStyle({ opacity: CONFIG.TRAIL_PATH_OPACITY });
                aircraftTrailPath.setLatLngs(pathCoords);
            } else if (pathCoords.length > 0) {
                aircraftTrailPath = L.polyline(pathCoords, {
                    color: CONFIG.TRAIL_PATH_COLOR,
                    weight: CONFIG.TRAIL_PATH_WEIGHT,
                    dashArray: '4, 6',
                    opacity: CONFIG.TRAIL_PATH_OPACITY,
                    interactive: false
                }).addTo(map);
            }
        }

        // Periodically prune expired trail points every 2 seconds
        setInterval(() => {
            if (aircraftTrail.length === 0) return;
            pruneExpiredTrailPoints();
            if (aircraftTrail.length > 0) {
                updateTrailPath(activeAircraftMarker ? activeAircraftMarker.getLatLng() : null);
            } else {
                // All trail points expired — clean up the polyline too
                if (aircraftTrailPath) {
                    map.removeLayer(aircraftTrailPath);
                    aircraftTrailPath = null;
                }
            }
        }, CONFIG.TRAIL_PRUNE_INTERVAL_MS);

        // Checks recently active detections to see if any can be triangulated with the new one
        function checkTriangulation(newDet) {
            const now = Date.now();

            // Filter active detections from other towers within the triangulation window
            const coincident = activeDetections.filter(d => {
                if (d.dev_eui === newDet.dev_eui) return false;
                const diff = getSecsDifference(d.node_time, newDet.node_time);
                return diff * 1000 <= TRIANGULATION_WINDOW_MS;
            });

            if (coincident.length === 0) return;

            // Group active coincident towers to get the latest bearing for each EUI
            const activeTowersMap = {};
            activeTowersMap[newDet.dev_eui] = newDet;
            coincident.forEach(d => {
                if (!activeTowersMap[d.dev_eui] || d.timestamp > activeTowersMap[d.dev_eui].timestamp) {
                    activeTowersMap[d.dev_eui] = d;
                }
            });
            const towers = Object.values(activeTowersMap);
            if (towers.length < 2) return;

            // Calculate the centroid/average coordinate of these participating towers for projection origin
            let lat_sum = 0;
            let lon_sum = 0;
            let valid_towers_count = 0;
            towers.forEach(t => {
                const node = nodesData.find(n => n.dev_eui === t.dev_eui);
                if (node) {
                    lat_sum += node.latitude;
                    lon_sum += node.longitude;
                    valid_towers_count++;
                }
            });
            if (valid_towers_count === 0) return;
            const lat_org = lat_sum / valid_towers_count;
            const lon_org = lon_sum / valid_towers_count;

            // Compute pairwise ray intersections in flat local projection
            const R_earth = 6378137.0;
            const intersections = [];
            for (let i = 0; i < towers.length; i++) {
                for (let j = i + 1; j < towers.length; j++) {
                    const detA = towers[i];
                    const detB = towers[j];
                    const nodeA = nodesData.find(n => n.dev_eui === detA.dev_eui);
                    const nodeB = nodesData.find(n => n.dev_eui === detB.dev_eui);
                    if (!nodeA || !nodeB) continue;

                    const posA = latLngToLocalCartesian(nodeA.latitude, nodeA.longitude, lat_org, lon_org);
                    const posB = latLngToLocalCartesian(nodeB.latitude, nodeB.longitude, lat_org, lon_org);

                    const centralInt = getRayIntersection(posA.x, posA.y, detA.azimuth, posB.x, posB.y, detB.azimuth, nodeA.range, nodeB.range);
                    if (centralInt) {
                        intersections.push(centralInt);
                    }
                }
            }

            if (intersections.length === 0) return;

            // Compute the average coordinate center of all pairwise intersections (highest probability zone)
            let sum_x = 0;
            let sum_y = 0;
            intersections.forEach(pt => {
                sum_x += pt.x;
                sum_y += pt.y;
            });
            const avg_x = sum_x / intersections.length;
            const avg_y = sum_y / intersections.length;

            const centerLatLng = localCartesianToLatLng(avg_x, avg_y, lat_org, lon_org);
            lastTriangulationTime = newDet.timestamp;

            // Compute the max spread of intersections (uncertainty boundary radius in meters)
            let max_spread = 20.0; // Minimum visual boundary
            intersections.forEach(pt => {
                const dx = pt.x - avg_x;
                const dy = pt.y - avg_y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > max_spread) {
                    max_spread = dist;
                }
            });

            // Factor in the Angular Uncertainty based on distance from the participating towers to the target centroid
            towers.forEach(t => {
                const node = nodesData.find(n => n.dev_eui === t.dev_eui);
                if (node) {
                    const pos = latLngToLocalCartesian(node.latitude, node.longitude, lat_org, lon_org);
                    const dx = avg_x - pos.x;
                    const dy = avg_y - pos.y;
                    const distToTarget = Math.sqrt(dx * dx + dy * dy);
                    const angularUncertaintyRad = (AZIMUTH_UNCERTAINTY * Math.PI) / 180;
                    const lateralUncertainty = distToTarget * Math.sin(angularUncertaintyRad);
                    if (lateralUncertainty > max_spread) {
                        max_spread = lateralUncertainty;
                    }
                }
            });

            // Resolve sound group color for the pulse marker
            const classInfo = window.soundClasses[newDet.class_id];
            const gName = classInfo ? classInfo.group_name : 'Unknown';
            const groupColor = getGroupColor(gName);

            // Cancel any pending fadeout timeouts or intervals
            if (aircraftFadeTimeout) {
                clearTimeout(aircraftFadeTimeout);
                aircraftFadeTimeout = null;
            }
            if (aircraftFadeInterval) {
                clearInterval(aircraftFadeInterval);
                aircraftFadeInterval = null;
            }

            // Restore marker visibility in case it was actively fading out
            if (activeAircraftMarker && activeAircraftMarker.getElement()) {
                activeAircraftMarker.getElement().style.opacity = '1';
            }

            if (activeAircraftMarker && activeAircraftUncertainty) {
                // Before moving the aircraft to the new centerLatLng, push its current state to the trail!
                const prevLatLng = activeAircraftMarker.getLatLng();
                const prevRadius = activeAircraftUncertainty.getRadius();
                const prevColor = activeAircraftUncertainty.options.color;

                addTrailPoint(prevLatLng, prevRadius, prevColor, centerLatLng);

                // Smoothly pan the aircraft to its newly triangulated center!
                activeAircraftMarker.setLatLng(centerLatLng);
                activeAircraftUncertainty.setLatLng(centerLatLng);
                activeAircraftUncertainty.setRadius(max_spread);

                // Reset styles to full opacity and color
                activeAircraftUncertainty.setStyle({
                    color: groupColor,
                    fillColor: groupColor,
                    opacity: 1.0,
                    fillOpacity: CONFIG.BLOB_FILL_OPACITY
                });

                // Synchronize HTML styling inside L.divIcon dynamically
                const iconDiv = activeAircraftMarker.getElement();
                if (iconDiv) {
                    const dot = iconDiv.querySelector('.radar-pulse-dot');
                    const ring = iconDiv.querySelector('.radar-pulse-ring');
                    if (dot) {
                        dot.style.backgroundColor = groupColor;
                        dot.style.boxShadow = `0 0 10px ${groupColor}`;
                    }
                    if (ring) {
                        ring.style.borderColor = groupColor;
                    }
                }
            } else {
                // Initialize the outer uncertainty boundary circle
                activeAircraftUncertainty = L.circle(centerLatLng, {
                    radius: max_spread,
                    color: groupColor,
                    weight: 1,
                    dashArray: '3, 3',
                    fillColor: groupColor,
                    fillOpacity: CONFIG.BLOB_FILL_OPACITY,
                    className: 'probability-blob-outer'
                }).addTo(map);

                // Initialize the pulsating glowing target blip
                const innerIcon = L.divIcon({
                    className: 'aircraft-pulse-icon',
                    html: `
                        <div class="radar-pulse-ring" style="border-color: ${groupColor};"></div>
                        <div class="radar-pulse-dot" style="background-color: ${groupColor}; box-shadow: 0 0 10px ${groupColor};"></div>
                    `,
                    iconSize: [24, 24],
                    iconAnchor: [12, 12]
                });

                activeAircraftMarker = L.marker(centerLatLng, { icon: innerIcon }).addTo(map);

                // Initialize the trail polyline path with the single current coordinate
                if (aircraftTrailPath) {
                    aircraftTrailPath.setLatLngs([centerLatLng]);
                    aircraftTrailPath.setStyle({ opacity: CONFIG.TRAIL_PATH_OPACITY });
                }
            }

            // Bind high-tech popup status report
            const popupContent = `
                <div style="font-family: 'Inter', sans-serif; min-width: 240px; font-size: 13px; color: #f8fafc; background: #0f172a; padding: 4px;">
                    <h4 style="margin: 0 0 8px 0; color: ${groupColor}; border-bottom: 2px solid ${groupColor}; padding-bottom: 4px; font-size: 14px; display: flex; align-items: center; gap: 6px;">
                        📡 Aircraft Radar Lock
                    </h4>
                    <b>Triangulated Sensors:</b> ${towers.length} towers<br/>
                    <b>Precision Spread:</b> ±${Math.round(max_spread)} meters<br/>
                    <b>Estimated Target:</b> ${centerLatLng[0].toFixed(6)}, ${centerLatLng[1].toFixed(6)}<br/>
                    <div style="margin-top: 8px; border-top: 1px dashed #334155; padding-top: 6px; font-size: 11px; color: #94a3b8;">
                        <b>Tracking Detections:</b><br/>
                        ${towers.map(t => {
                const node = nodesData.find(n => n.dev_eui === t.dev_eui);
                return `● ${node ? node.name : t.dev_eui.substring(0, 8)} (Azimuth: ${parseFloat(t.azimuth).toFixed(1)}°)`;
            }).join('<br/>')}
                    </div>
                </div>
            `;
            activeAircraftUncertainty.bindPopup(popupContent);

            // Programmatic radar phosphor fadeout if target signal is lost
            rescheduleAircraftFadeOut();
        }

        function drawDetection(det, ageMs = 0) {
            if (det.azimuth === null || det.azimuth === undefined) return;

            // Skip drawing lines for mic-check health codes
            const cid = parseInt(det.class_id);
            if (cid === CONFIG.HEALTH_OK_CLASS_ID || cid === CONFIG.HEALTH_ERROR_CLASS_ID) return;

            const now = Date.now();
            let secsSinceMidnight = det.node_time;
            if (secsSinceMidnight === undefined || secsSinceMidnight === null) {
                // Fallback to browser local seconds since midnight if not provided
                const d = new Date(now - ageMs);
                secsSinceMidnight = d.getHours() * 3600 + d.getMinutes() * 60 + d.getSeconds() + d.getMilliseconds() / 1000;
            }

            const node = nodesData.find(n => n.dev_eui === det.dev_eui);
            if (node) {
                const detectionRecord = {
                    dev_eui: det.dev_eui,
                    azimuth: parseFloat(det.azimuth),
                    class_id: det.class_id,
                    timestamp: now - ageMs,
                    node_time: parseFloat(secsSinceMidnight)
                };
                activeDetections.push(detectionRecord);

                // Auto-cleanup detection record after FADE_OUT_TIME_MS
                const remainingTime = Math.max(0, FADE_OUT_TIME_MS - ageMs);
                setTimeout(() => {
                    const idx = activeDetections.indexOf(detectionRecord);
                    if (idx !== -1) {
                        activeDetections.splice(idx, 1);
                    }
                }, remainingTime);

                // Calculate bearing destination point
                const radiusEarth = 6378137; // meters
                const distance = parseFloat(node.range || 5000);
                const brng = det.azimuth * Math.PI / 180;
                const lat1 = node.latitude * Math.PI / 180;
                const lon1 = node.longitude * Math.PI / 180;

                const lat2 = Math.asin(Math.sin(lat1) * Math.cos(distance / radiusEarth) +
                    Math.cos(lat1) * Math.sin(distance / radiusEarth) * Math.cos(brng));
                const lon2 = lon1 + Math.atan2(Math.sin(brng) * Math.sin(distance / radiusEarth) * Math.cos(lat1),
                    Math.cos(distance / radiusEarth) - Math.sin(lat1) * Math.sin(lat2));

                const destLat = lat2 * 180 / Math.PI;
                const destLng = lon2 * 180 / Math.PI;

                // Look up group name in soundClasses to determine the color
                const classInfo = window.soundClasses[det.class_id];
                const gName = classInfo ? classInfo.group_name : 'Unknown';
                const color = getGroupColor(gName);

                // Detection line style
                const lineOpacity = 0.12;
                const lineWeight = 1.5;

                const remainingLineTime = Math.max(0, LINE_LIFETIME_MS - ageMs);
                if (remainingLineTime > 0) {
                    const detectionLine = L.polyline([
                        [node.latitude, node.longitude],
                        [destLat, destLng]
                    ], {
                        color: color,
                        weight: lineWeight,
                        opacity: lineOpacity
                    }).addTo(map);

                    // Fade out the bearing line
                    setTimeout(() => {
                        map.removeLayer(detectionLine);
                    }, remainingLineTime);
                }

                // Scan for and trigger cross-triangulations
                checkTriangulation(detectionRecord);
            }
        }



        // Websocket triggers
        socket.on('new_detections', function (detections) {
            console.log("Received new detections:", detections);
            detections.forEach(det => drawDetection(det, 0));
