<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIVS Gateway - Node Map</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <!-- Leaflet Geocoder CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <!-- Google Fonts Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #0f172a;
        }

        #map-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        #map {
            height: 100%;
            width: 100%;
            background: #1e293b;
        }

        /* Custom map control for sidebar */
        .leaflet-control-sidebar-toggle {
            background-color: white;
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            cursor: pointer;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background-clip: padding-box;
        }

        .leaflet-control-sidebar-toggle:hover {
            background-color: #f4f4f4;
        }

        /* Sidebar styling */

        #sidebar {
            position: absolute;
            top: 0;
            right: -300px;
            width: 300px;
            height: 100vh;
            background: white;
            box-shadow: -2px 0 5px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            transition: right 0.3s;
            display: flex;
            flex-direction: column;
        }

        #sidebar.open {
            right: 0;
        }

        .sidebar-header {
            padding: 15px;
            background: #2196F3;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-close {
            cursor: pointer;
            font-size: 20px;
        }

        .node-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .node-item {
            background: #f9f9f9;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 11px;
        }

        button.action-btn {
            padding: 3px 6px;
        }

        .leaflet-popup-content {
            font-size: 14px;
        }

        .node-item h4 {
            margin: 0 0 5px 0;
            font-size: 14px;
        }

        .node-actions {
            display: flex;
            gap: 5px;
            margin-top: 8px;
        }

        .node-actions button {
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid #ccc;
            background: white;
            border-radius: 3px;
        }

        .node-actions button:hover {
            background: #eee;
        }

        /* Tooltip styling */
        .node-tooltip {
            background: transparent;
            border: none;
            box-shadow: none;
            font-weight: bold;
            color: #333;
            text-shadow: 1px 1px 2px white, -1px -1px 2px white, 1px -1px 2px white, -1px 1px 2px white;
        }

        /* Pulsating Aircraft Radar Blob styles */
        .aircraft-pulse-icon {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .radar-pulse-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            z-index: 2;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        .radar-pulse-ring {
            position: absolute;
            width: 32px;
            height: 32px;
            border: 2px solid;
            border-radius: 50%;
            animation: radar-pulsate 1.8s ease-out infinite;
            opacity: 0;
            z-index: 1;
            transition: border-color 0.3s ease;
        }

        @keyframes radar-pulsate {
            0% {
                transform: scale(0.3);
                opacity: 0.8;
            }

            80% {
                transform: scale(1.2);
                opacity: 0;
            }

            100% {
                transform: scale(1.2);
                opacity: 0;
            }
        }

        /* ADS-B aircraft markers */
        .adsb-aircraft-icon {
            font-size: 20px;
            text-shadow: 0 0 4px rgba(0, 0, 0, 0.6);
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .adsb-aircraft-icon.ground {
            opacity: 0.5;
        }

        .adsb-popup-table {
            font-size: 12px;
            border-collapse: collapse;
            width: 100%;
        }

        .adsb-popup-table td {
            padding: 2px 6px;
        }

        .adsb-popup-table td:first-child {
            font-weight: 600;
            color: #555;
            white-space: nowrap;
        }

        .adsb-callsign-tooltip {
            background: rgba(0, 0, 0, 0.7);
            border: none;
            color: #fff;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 5px;
            border-radius: 3px;
            box-shadow: none;
            letter-spacing: 0.5px;
        }

        .adsb-callsign-tooltip::before {
            border: none;
        }

        .adsb-link {
            display: inline-block;
            margin-top: 6px;
            color: #2563eb;
            text-decoration: none;
            font-size: 11px;
            font-weight: 600;
        }

        .adsb-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div id="map-container">
        <div id="map"></div>



        <div id="sidebar">
            <div class="sidebar-header">
                <h3 style="margin: 0; font-size: 16px;">Registered Nodes</h3>
                <span class="sidebar-close" onclick="toggleSidebar()">✕</span>
            </div>
            <div style="padding: 10px 15px; border-bottom: 1px solid #ccc; background: #f4f4f4;">
                <input type="text" id="searchInput" placeholder="Search nodes/gateways..."
                    style="width: 100%; padding: 6px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;"
                    onkeyup="filterSidebar()">
            </div>
            <div style="padding: 12px 15px; border-bottom: 1px solid #e0e0e0; background: #fafafa;">
                <label for="timeWindowInput"
                    style="font-size: 11px; font-weight: bold; color: #555; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px;">⏱️
                    Triangulation Window</label>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <input type="range" id="timeWindowInput" min="1" max="15" step="0.5" value="3.0"
                        style="flex-grow: 1; accent-color: #e64a19; cursor: pointer;"
                        oninput="updateTimeWindow(this.value)">
                    <span id="timeWindowVal"
                        style="font-size: 13px; font-weight: bold; color: #e64a19; min-width: 38px; text-align: right;">3.0s</span>
                </div>
            </div>
            <div style="padding: 12px 15px; border-bottom: 1px solid #e0e0e0; background: #fafafa;">
                <label for="azimuthUncertaintyInput"
                    style="font-size: 11px; font-weight: bold; color: #555; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px;">📐
                    Angular Uncertainty</label>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <input type="range" id="azimuthUncertaintyInput" min="1" max="25" step="0.5" value="5.0"
                        style="flex-grow: 1; accent-color: #d84315; cursor: pointer;"
                        oninput="updateAzimuthUncertainty(this.value)">
                    <span id="azimuthUncertaintyVal"
                        style="font-size: 13px; font-weight: bold; color: #d84315; min-width: 38px; text-align: right;">±5.0°</span>
                </div>
            </div>
            <div style="padding: 12px 15px; border-bottom: 1px solid #e0e0e0; background: #fafafa;">
                <label for="fadeOutInput"
                    style="font-size: 11px; font-weight: bold; color: #555; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px;">🎯
                    Blob Target Lifetime</label>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <input type="range" id="fadeOutInput" min="5" max="300" step="5" value="60"
                        style="flex-grow: 1; accent-color: #0288d1; cursor: pointer;"
                        oninput="updateFadeOut(this.value)">
                    <span id="fadeOutVal"
                        style="font-size: 13px; font-weight: bold; color: #0288d1; min-width: 38px; text-align: right;">60s</span>
                </div>
            </div>
            <div style="padding: 12px 15px; border-bottom: 1px solid #e0e0e0; background: #fafafa;">
                <label for="lineLifetimeInput"
                    style="font-size: 11px; font-weight: bold; color: #555; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px;">📏
                    Detection Line Lifetime</label>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <input type="range" id="lineLifetimeInput" min="1" max="120" step="1" value="10"
                        style="flex-grow: 1; accent-color: #9c27b0; cursor: pointer;"
                        oninput="updateLineLifetime(this.value)">
                    <span id="lineLifetimeVal"
                        style="font-size: 13px; font-weight: bold; color: #9c27b0; min-width: 38px; text-align: right;">10s</span>
                </div>
            </div>
            <div class="node-list" id="nodeList">
                <!-- Nodes dynamically injected here by JS -->
            </div>
        </div>
    </div>



    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <!-- Leaflet Geocoder JS -->
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script>
        // Initialize the map, centered on specific coordinates
        const worldBounds = [
            [-90, -180],
            [90, 180]
        ];

        const map = L.map('map', {
            maxBounds: worldBounds,
            maxBoundsViscosity: 1.0 // Prevents dragging completely outside the bounds
        }).setView([41.4, -7.8], 8);

        // Calculate and set the minimum zoom required to fit the bounds
        map.setMinZoom(map.getBoundsZoom(worldBounds, true));

        // Update minZoom dynamically if window is resized
        window.addEventListener('resize', function () {
            map.setMinZoom(map.getBoundsZoom(worldBounds, true));
        });

        // ─── Base map layers ────────────────────────────────────────
        const streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            noWrap: true,
            bounds: worldBounds,
            attribution: '© OpenStreetMap contributors'
        });

        const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 18,
            noWrap: true,
            bounds: worldBounds,
            attribution: 'Tiles © Esri — Source: Esri, Maxar, Earthstar Geographics'
        });

        const topoLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
            maxZoom: 17,
            noWrap: true,
            bounds: worldBounds,
            attribution: '© OpenTopoMap (CC-BY-SA)'
        });

        const darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 20,
            noWrap: true,
            bounds: worldBounds,
            subdomains: 'abcd',
            attribution: '© CARTO'
        });

        // Restore saved map type preference or default to Street
        const baseMaps = {
            '🗺️ Street': streetLayer,
            '🛰️ Satellite': satelliteLayer,
            '⛰️ Topographic': topoLayer,
            '🌙 Dark': darkLayer
        };
        const savedMapType = localStorage.getItem('divs_map_type') || '🗺️ Street';
        (baseMaps[savedMapType] || streetLayer).addTo(map);

        // ─── ADS-B aircraft overlay layer ─────────────────────────
        const adsbLayerGroup = L.layerGroup();
        const adsbEnabled = localStorage.getItem('divs_adsb_enabled') !== 'false';
        if (adsbEnabled) adsbLayerGroup.addTo(map);

        const overlayMaps = {
            '✈️ ADS-B Aircraft': adsbLayerGroup
        };

        // Add layer control selector (top-right) with base + overlay
        L.control.layers(baseMaps, overlayMaps, { position: 'topright' }).addTo(map);

        // Persist the user's map type selection
        map.on('baselayerchange', function (e) {
            localStorage.setItem('divs_map_type', e.name);
        });

        // Persist ADS-B overlay toggle
        map.on('overlayadd', function (e) {
            if (e.name === '✈️ ADS-B Aircraft') {
                localStorage.setItem('divs_adsb_enabled', 'true');
                fetchAdsbData(); // Immediate refresh on enable
            }
        });
        map.on('overlayremove', function (e) {
            if (e.name === '✈️ ADS-B Aircraft') {
                localStorage.setItem('divs_adsb_enabled', 'false');
            }
        });

        // ─── ADS-B Live Aircraft Tracking ─────────────────────────
        const adsbMarkers = {};  // hex -> { marker }
        let activeTrackPolyline = null;  // currently displayed OpenSky track
        let adsbFetchTimer = null;
        const ADSB_POLL_INTERVAL = 10000; // 10 seconds
        const ADSB_RADIUS_NM = 250;       // nautical miles
        let selectedAircraftHex = null;   // hex of currently selected aircraft

        function getAltitudeColor(altBaro) {
            if (altBaro === 'ground' || altBaro == null) return '#888';
            const alt = parseInt(altBaro);
            if (alt < 1000) return '#4ade80';    // green – low
            if (alt < 10000) return '#facc15';   // yellow – medium
            if (alt < 25000) return '#fb923c';   // orange – high
            return '#f87171';                     // red – very high
        }

        function formatAltitude(altBaro) {
            if (altBaro === 'ground') return 'Ground';
            if (altBaro == null) return '—';
            return parseInt(altBaro).toLocaleString() + ' ft';
        }

        // SVG aircraft silhouettes loaded from /static/airplanes/
        const AIRCRAFT_SVGS = {};
        const SVG_FILE_MAP = {
            ultralight: 'mono propeller ultralight',
            light:      'jet ryanair',
            bizjet:     'jet',
            jet2:       'jet2',
            jet:        'airliner 2 engines',
            jet_short:  'airliner 2 engines short',
            jet_shorter:'airliner 2 engines shorter',
            jet_long:   'airliner 2 engines long',
            heavy:      'airliner 4 engine',
            fighter:    'fighter',
            bomber:     'bomber jet',
            heli:       'helicoper',
            fire:       'fire',
        };
        // Fallback inline SVG while loading
        const FALLBACK_SVG = '<svg viewBox="0 0 32 32"><path d="M16 1 L14.5 8 L3 15 L3 17 L14.5 14 L14.5 25 L10 28 L10 30 L16 27.5 L22 30 L22 28 L17.5 25 L17.5 14 L29 17 L29 15 L17.5 8 Z"/></svg>';
        // Load all SVGs at startup
        Object.entries(SVG_FILE_MAP).forEach(([key, filename]) => {
            fetch(`/static/airplanes/${encodeURIComponent(filename)}.svg`)
                .then(r => r.text())
                .then(svg => { AIRCRAFT_SVGS[key] = svg.replace(/fill="[^"]*"/g, ''); })
                .catch(() => { AIRCRAFT_SVGS[key] = FALLBACK_SVG; });
        });

        function getAircraftSvg(category, typeCode) {
            const t = (typeCode || '').toUpperCase();
            const cat = (category || '').toUpperCase();

            // Helicopter types
            if (cat === 'A7' || /^(H[0-9]|EC[0-9]|AS[0-9]|R22|R44|R66|S[0-9]{2}|B[0-9]{3}H|A109|AW|NH90|LYNX|PUMA|BELL|UH|AH|CH[0-9]|MI[0-9]|KA[0-9])/.test(t)) {
                return AIRCRAFT_SVGS.heli;
            }
            // Ground vehicles / fire / emergency
            if (cat.startsWith('B') || cat === 'C3') {
                return AIRCRAFT_SVGS.fire;
            }
            // Military fighter
            if (/^(F1[4-8]|F2[0-2]|F35|EF20|EUFI|RAFA|GRIF|TORN|MIG|SU[0-9]|JAS|HAWK|T38|T45|L39|M346|FA18|F16|F15)/.test(t)) {
                return AIRCRAFT_SVGS.fighter;
            }
            // Military bomber / stealth / large military
            if (/^(B1|B2|B52|A10|AC13|C130|C17|KC|P3|P8|E[0-9][A-Z]|RC|U2|RQ|MQ|PRED|REAP)/.test(t)) {
                return AIRCRAFT_SVGS.bomber;
            }
            // Heavy 4-engine (B747, A380, A340, AN-124)
            if (cat === 'A5' || /^(B74|A34|A38|IL96|AN12|AN22|AN12|C5|A400)/.test(t)) {
                return AIRCRAFT_SVGS.heavy;
            }
            // Long-range 2-engine (B777, B787, A350, A330)
            if (/^(B77|B78|A35|A33|A30|B76)/.test(t)) {
                return AIRCRAFT_SVGS.jet_long;
            }
            // Medium 2-engine (A320, B737, B757)
            if (cat === 'A3' || /^(B73|B38|A31|A32|A2[0-2]|B75|MD[0-9]|B71|B72|DC9|F[0-9]{2})/.test(t)) {
                return AIRCRAFT_SVGS.jet_short;
            }
            // Regional jets / short-haul
            if (/^(E[0-9]{3}|CRJ|ERJ|DH8|AT[0-9]|SF34|J32|D328|AN[0-9]{2})/.test(t)) {
                return AIRCRAFT_SVGS.jet_shorter;
            }
            // Business jet (Gulfstream, Citation, Learjet, Falcon, etc.)
            if (cat === 'A4' || /^(GLF|CL[0-9]|LJ[0-9]|FA[0-9]|C56|C68|C25|C75|GA[0-9]|H25|BE4|PRM|PC24)/.test(t)) {
                return AIRCRAFT_SVGS.bizjet;
            }
            // Small twin / commuter
            if (cat === 'A2' || /^(BE[0-9]|C[0-4][0-9]{2}|PA[0-9]{2}T|DHC|BN2|L410|SW[0-9]|P06T|P18)/.test(t)) {
                return AIRCRAFT_SVGS.jet2;
            }
            // Light single-engine GA
            if (cat === 'A1' || /^(C1[0-9]{2}|C20[0-9]|PA[0-9]{2}|DR[0-9]|P28|PA28|PA32|AA[0-9]|DA[0-9]|SR2[0-2]|RV[0-9]|M20|TB[0-9])/.test(t)) {
                return AIRCRAFT_SVGS.light;
            }
            // Ultralight / glider / paramotor
            if (cat === 'A0' || cat === 'C1' || cat === 'C2' || /^(ULM|PARA|GLAS|GLID|ASK|LS[0-9]|DG[0-9]|VENT)/.test(t)) {
                return AIRCRAFT_SVGS.ultralight;
            }
            // Default: standard airliner
            return AIRCRAFT_SVGS.jet || FALLBACK_SVG;
        }

        function createAdsbPopup(ac) {
            const callsign = (ac.flight || '').trim() || '—';
            const reg = ac.r || '—';
            const type = ac.t || '—';
            const alt = formatAltitude(ac.alt_baro);
            const gs = ac.gs != null ? Math.round(ac.gs) + ' kts' : '—';
            const squawk = ac.squawk || '—';
            const heading = ac.track != null ? Math.round(ac.track) + '°' : '—';
            const vr = ac.baro_rate != null ? (ac.baro_rate > 0 ? '+' : '') + ac.baro_rate + ' ft/min' : '—';
            const hex = ac.hex.toUpperCase();
            const globeUrl = `https://globe.adsb.lol/?icao=${ac.hex}`;

            return `<div style="min-width:180px">
                <div style="font-weight:700;font-size:14px;margin-bottom:4px;border-bottom:1px solid #ddd;padding-bottom:3px">
                    ✈️ ${callsign}
                </div>
                <table class="adsb-popup-table">
                    <tr><td>ICAO</td><td>${hex}</td></tr>
                    <tr><td>Reg</td><td>${reg}</td></tr>
                    <tr><td>Type</td><td>${type}</td></tr>
                    <tr><td>Altitude</td><td>${alt}</td></tr>
                    <tr><td>Speed</td><td>${gs}</td></tr>
                    <tr><td>Heading</td><td>${heading}</td></tr>
                    <tr><td>V/S</td><td>${vr}</td></tr>
                    <tr><td>Squawk</td><td>${squawk}</td></tr>
                </table>
                <a class="adsb-link" href="${globeUrl}" target="_blank" rel="noopener">🌐 Full history on adsb.lol</a>
            </div>`;
        }

        function clearTrack() {
            if (activeTrackPolyline) {
                adsbLayerGroup.removeLayer(activeTrackPolyline);
                activeTrackPolyline = null;
            }
        }

        function fetchAndShowTrack(icao24) {
            clearTrack();
            fetch(`/api/adsb/track/${icao24}`)
                .then(res => {
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return res.json();
                })
                .then(data => {
                    if (!data.path || !Array.isArray(data.path) || data.path.length < 2) return;
                    // path entries: [timestamp, lat, lon, altitude_m, track, on_ground]
                    const latlngs = data.path.map(p => [p[1], p[2]]);
                    activeTrackPolyline = L.polyline(latlngs, {
                        color: '#3b82f6',
                        weight: 3,
                        opacity: 0.8,
                        dashArray: '8, 5'
                    });
                    adsbLayerGroup.addLayer(activeTrackPolyline);
                })
                .catch(err => console.warn('Track fetch error:', err));
        }

        function updateAdsbMarkers(aircraftList) {
            const seenHex = new Set();

            aircraftList.forEach(ac => {
                if (ac.lat == null || ac.lon == null) return;
                seenHex.add(ac.hex);

                const rotation = ac.track != null ? ac.track : 0;
                const isGround = ac.alt_baro === 'ground';
                const callsign = (ac.flight || '').trim();
                const color = getAltitudeColor(ac.alt_baro);

                if (adsbMarkers[ac.hex]) {
                    // Update existing marker position & rotation
                    const existing = adsbMarkers[ac.hex];
                    existing.marker.setLatLng([ac.lat, ac.lon]);
                    const el = existing.marker.getElement();
                    if (el) {
                        el.style.transform = el.style.transform.replace(/rotate\([^)]*\)/, '') + ` rotate(${rotation}deg)`;
                        const svg = el.querySelector('svg path, svg rect');
                        if (svg) svg.setAttribute('fill', color);
                    }
                    existing.marker.setPopupContent(createAdsbPopup(ac));
                    if (callsign) existing.marker.setTooltipContent(callsign);
                } else {
                    // Create new marker with type-specific SVG icon
                    const svgHtml = getAircraftSvg(ac.category, ac.t);
                    const iconHtml = svgHtml.replace('<svg ', `<svg style="fill:${color};filter:drop-shadow(0 0 2px rgba(0,0,0,0.5))" `);
                    const iconSize = ac.category === 'A5' || (ac.t && /^(B74|B77|B78|A33|A34|A35|A38)/.test(ac.t.toUpperCase())) ? [28, 28] : [24, 24];
                    const icon = L.divIcon({
                        html: `<div class="adsb-aircraft-icon ${isGround ? 'ground' : ''}" style="transform:rotate(${rotation}deg)">${iconHtml}</div>`,
                        className: '',
                        iconSize: iconSize,
                        iconAnchor: [iconSize[0] / 2, iconSize[1] / 2]
                    });

                    const marker = L.marker([ac.lat, ac.lon], {
                        icon: icon,
                        interactive: true,
                        zIndexOffset: isGround ? -1000 : (ac.alt_baro || 0)
                    });

                    marker.bindPopup(createAdsbPopup(ac), { maxWidth: 250, autoPan: false });

                    if (callsign) {
                        marker.bindTooltip(callsign, {
                            permanent: false,
                            direction: 'top',
                            offset: [0, -12],
                            className: 'adsb-callsign-tooltip'
                        });
                    }

                    // Fetch and show track on click
                    marker.on('click', function () {
                        selectedAircraftHex = ac.hex;
                        fetchAndShowTrack(ac.hex);
                    });

                    adsbLayerGroup.addLayer(marker);
                    adsbMarkers[ac.hex] = { marker };
                }
            });

            // Remove markers for aircraft no longer in the response
            Object.keys(adsbMarkers).forEach(hex => {
                if (!seenHex.has(hex)) {
                    adsbLayerGroup.removeLayer(adsbMarkers[hex].marker);
                    delete adsbMarkers[hex];
                }
            });
        }

        function fetchAdsbData() {
            if (!map.hasLayer(adsbLayerGroup)) return;

            const center = map.getCenter();
            const url = `/api/adsb?lat=${center.lat.toFixed(4)}&lon=${center.lng.toFixed(4)}&dist=${ADSB_RADIUS_NM}`;

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.ac && Array.isArray(data.ac)) {
                        updateAdsbMarkers(data.ac);
                    }
                })
                .catch(err => console.warn('ADS-B fetch error:', err));
        }

        // Start ADS-B polling

        // Sound group color mapper — looks up the group name in CONFIG.GROUP_COLORS

            if (!groupName) return CONFIG.GROUP_COLORS._default;

        // =====================================================================
        // CENTRALIZED CONFIGURATION

        const CONFIG = {

            STALENESS_CHECK_INTERVAL_MS: 30000, // 30 seconds

        // Triangulation state
        const activeDetections = [];
        const activeTriangulations = new Set();
        let AZIMUTH_UNCERTAINTY = 5.0; // Configurable ±degrees error envelope
        let TRIANGULATION_WINDOW_MS = 3000; // Configurable window in milliseconds
        let FADE_OUT_TIME_MS = 60000; // Configurable detection fadeout lifetime (default 60s)
        let LINE_LIFETIME_MS = 10000; // Configurable detection line lifetime (default 10s)

        window.soundClasses = {};

        // Active dynamic aircraft radar tracking elements
        let activeAircraftMarker = null;
        let activeAircraftUncertainty = null;
        let aircraftFadeTimeout = null;
        let aircraftFadeInterval = null;
        let aircraftTrail = []; // Array of { latLng: [lat, lon], radius: meters, color: hex, circle: L.circle }
        let aircraftTrailPath = null; // L.polyline connecting coordinates

        let lastTriangulationTime = 0;

        // Helper to handle 24h midnight rollover for seconds past midnight
        function getSecsDifference(t1, t2) {
            let diff = Math.abs(t1 - t2);
            if (diff > 43200) {
                diff = 86400 - diff;
            }
            return diff;
        }

        function updateTimeWindow(val) {
            const seconds = parseFloat(val);

                TRIANGULATION_WINDOW_MS = seconds * 1000;

        function updateAzimuthUncertainty(val) {

        function updateFadeOut(val) {

        function updateLineLifetime(val) {

                document.getElementById('lineLifetimeInput').value = val;
                console.log("Updated line lifetime to:", LINE_LIFETIME_MS, "ms");
            }
        }

        function rescheduleAircraftFadeOut() {
            if (!activeAircraftMarker) return; // No active aircraft to fade out

            // Clear any existing fadeout timeouts or intervals
            if (aircraftFadeTimeout) {
                clearTimeout(aircraftFadeTimeout);
                aircraftFadeTimeout = null;
            }
            if (aircraftFadeInterval) {
                clearInterval(aircraftFadeInterval);
                aircraftFadeInterval = null;
            }

            // Restore marker visibility to full
            const markerEl = activeAircraftMarker.getElement();
            if (markerEl) {
                markerEl.style.opacity = '1';
            }
            if (activeAircraftUncertainty) {
                activeAircraftUncertainty.setStyle({
                    opacity: 1.0,
                    fillOpacity: 0.08
                });
            }
            if (aircraftTrailPath) {
                aircraftTrailPath.setStyle({ opacity: CONFIG.TRAIL_PATH_OPACITY });
            }

            const elapsed = Date.now() - lastTriangulationTime;
            const remaining = Math.max(0, FADE_OUT_TIME_MS - elapsed);

            if (remaining <= 0) {
                // If it already expired, remove it immediately
                if (activeAircraftUncertainty) map.removeLayer(activeAircraftUncertainty);
                if (activeAircraftMarker) map.removeLayer(activeAircraftMarker);
                activeAircraftUncertainty = null;
                activeAircraftMarker = null;

                // Clear and remove trail circles
                aircraftTrail.forEach(pt => {
                    if (pt.circle) map.removeLayer(pt.circle);
                });
                aircraftTrail = [];

                // Remove trail polyline
                if (aircraftTrailPath) {
                    map.removeLayer(aircraftTrailPath);
                    aircraftTrailPath = null;
                }
            } else {
                // Start a new fadeout timeout
                aircraftFadeTimeout = setTimeout(() => {
                    let opacity = 1.0;
                    aircraftFadeInterval = setInterval(() => {
                        opacity -= 0.05;
                        if (opacity <= 0) {
                            clearInterval(aircraftFadeInterval);
                            aircraftFadeInterval = null;
                            if (activeAircraftUncertainty) map.removeLayer(activeAircraftUncertainty);
                            if (activeAircraftMarker) map.removeLayer(activeAircraftMarker);
                            activeAircraftUncertainty = null;
                            activeAircraftMarker = null;

                            // Clear and remove trail circles
                            aircraftTrail.forEach(pt => {
                                if (pt.circle) map.removeLayer(pt.circle);
                            });
                            aircraftTrail = [];

                            // Remove trail polyline
                            if (aircraftTrailPath) {
                                map.removeLayer(aircraftTrailPath);
                                aircraftTrailPath = null;
                            }
                        } else {
                            if (activeAircraftUncertainty) {
                                activeAircraftUncertainty.setStyle({ fillOpacity: opacity * CONFIG.BLOB_FILL_OPACITY, opacity: opacity });
                            }
                            if (activeAircraftMarker) {
                                const el = activeAircraftMarker.getElement();
                                if (el) el.style.opacity = opacity;
                            }
                            // Fade trail circles uniformly
                            aircraftTrail.forEach(pt => {
                                pt.circle.setStyle({
                                    opacity: opacity * CONFIG.TRAIL_CIRCLE_OPACITY,
                                    fillOpacity: opacity * CONFIG.TRAIL_CIRCLE_FILL_OPACITY
                                });
                            });
                            // Fade trail polyline
                            if (aircraftTrailPath) {
                                aircraftTrailPath.setStyle({ opacity: opacity * CONFIG.TRAIL_PATH_OPACITY });
                            }
                        }
                    }, 50);
                }, remaining);
            }
        }

        function initSettings() {
            // Load Triangulation Window
            const savedTimeWindow = localStorage.getItem('triangulation_window_ms');
            if (savedTimeWindow !== null) {
                updateTimeWindow(parseFloat(savedTimeWindow) / 1000);
            } else {
                updateTimeWindow(3.0);
            }

            // Load Azimuth Uncertainty
            const savedAzimuth = localStorage.getItem('azimuth_uncertainty');
            if (savedAzimuth !== null) {
                updateAzimuthUncertainty(parseFloat(savedAzimuth));
            } else {
                updateAzimuthUncertainty(5.0);
            }

            // Load Fade Out Lifetime
            const savedFadeOut = localStorage.getItem('fade_out_time_ms');
            if (savedFadeOut !== null) {
                updateFadeOut(parseFloat(savedFadeOut) / 1000);
            } else {
                updateFadeOut(60);
            }

            // Load Line Lifetime
            const savedLineLifetime = localStorage.getItem('line_lifetime_ms');
            if (savedLineLifetime !== null) {
                updateLineLifetime(parseFloat(savedLineLifetime) / 1000);
            } else {
                updateLineLifetime(10);
            }
        }

        // Initialize persisted settings
        initSettings();

        // Local flat-earth Mercator coordinate conversion helpers
        function latLngToLocalCartesian(lat, lon, lat_org, lon_org) {
            const R = 6378137.0; // Earth radius in meters
            const latRad = lat * Math.PI / 180;
            const latOrgRad = lat_org * Math.PI / 180;
            const lonRad = lon * Math.PI / 180;
            const lonOrgRad = lon_org * Math.PI / 180;

            const y = (latRad - latOrgRad) * R;
            const x = (lonRad - lonOrgRad) * R * Math.cos(latOrgRad);
            return { x, y };
        }

        function localCartesianToLatLng(x, y, lat_org, lon_org) {
            const R = 6378137.0;
            const latOrgRad = lat_org * Math.PI / 180;
            const latRad = latOrgRad + (y / R);
            const lonRad = (lon_org * Math.PI / 180) + (x / (R * Math.cos(latOrgRad)));
            return [latRad * 180 / Math.PI, lonRad * 180 / Math.PI];
        }

        // Ray Intersection Math using 2D Perp-Dot Products
        // Returns { x, y } in local meters, or null if parallel / invalid
        function getRayIntersection(x1, y1, az1, x2, y2, az2, range1, range2) {
            const rad1 = az1 * Math.PI / 180;
            const rad2 = az2 * Math.PI / 180;

            // Direction vectors (x: East, y: North)
            const ux = Math.sin(rad1);
            const uy = Math.cos(rad1);
            const vx = Math.sin(rad2);
            const vy = Math.cos(rad2);

            // Determinant
            const det = ux * vy - uy * vx;
            if (Math.abs(det) < 1e-6) {
                return null; // parallel or anti-parallel rays
            }

            // Ray parameter distance coefficients
            const t1 = ((x2 - x1) * vy - (y2 - y1) * vx) / det;
            const t2 = ((x2 - x1) * uy - (y2 - y1) * ux) / det;

            // Limit intersections to forward rays and within maximum range envelope
            const maxRange1 = (parseFloat(range1) || 5000) * 1.5;
            const maxRange2 = (parseFloat(range2) || 5000) * 1.5;

            if (t1 >= 0 && t2 >= 0 && t1 <= maxRange1 && t2 <= maxRange2) {
                return {
                    x: x1 + t1 * ux,
                    y: y1 + t1 * uy,
                    t1: t1,
                    t2: t2
                };
            }
            return null;
        }

        // Add a historical breadcrumb to the aircraft radar tracking trail
        function addTrailPoint(latLng, radius, color, activeLatLng) {
            // Prune trail points older than the configured blob lifetime
            pruneExpiredTrailPoints();

            // Create a Leaflet circle for this trail point — constant opacity,
            // no falloff.  Trail stays fully visible for its entire lifetime.
            const trailCircle = L.circle(latLng, {
                radius: radius,
                color: color,
                weight: 1,
                dashArray: '3, 4',
                fillColor: color,
                fillOpacity: CONFIG.TRAIL_CIRCLE_FILL_OPACITY,
                opacity: CONFIG.TRAIL_CIRCLE_OPACITY,
                interactive: false
            }).addTo(map);

            aircraftTrail.push({
                latLng: latLng,
                radius: radius,
                color: color,
                circle: trailCircle,
                createdAt: Date.now()
            });

            // Redraw the dashed polyline connecting all trail coordinates
            updateTrailPath(activeLatLng);
        }

        // Remove trail points that have exceeded the configured blob lifetime
        function pruneExpiredTrailPoints() {
            const now = Date.now();
            while (aircraftTrail.length > 0 && (now - aircraftTrail[0].createdAt) > FADE_OUT_TIME_MS) {
                const oldest = aircraftTrail.shift();
                if (oldest.circle) {
                    map.removeLayer(oldest.circle);
                }
            }
        }


        // Redraw the dashed polyline connecting all trail coordinates plus the active blob position
        function updateTrailPath(activeLatLng) {
            const pathCoords = aircraftTrail.map(pt => pt.latLng);
            if (activeLatLng) {
                pathCoords.push(activeLatLng);
            }

            if (aircraftTrailPath) {
                aircraftTrailPath.setStyle({ opacity: CONFIG.TRAIL_PATH_OPACITY });
                aircraftTrailPath.setLatLngs(pathCoords);
            } else if (pathCoords.length > 0) {
                aircraftTrailPath = L.polyline(pathCoords, {
                    color: CONFIG.TRAIL_PATH_COLOR,
                    weight: CONFIG.TRAIL_PATH_WEIGHT,
                    dashArray: '4, 6',
                    opacity: CONFIG.TRAIL_PATH_OPACITY,
                    interactive: false
                }).addTo(map);
            }
        }

        // Periodically prune expired trail points every 2 seconds
        setInterval(() => {
            if (aircraftTrail.length === 0) return;
            pruneExpiredTrailPoints();
            if (aircraftTrail.length > 0) {
                updateTrailPath(activeAircraftMarker ? activeAircraftMarker.getLatLng() : null);
            } else {
                // All trail points expired — clean up the polyline too
                if (aircraftTrailPath) {
                    map.removeLayer(aircraftTrailPath);
                    aircraftTrailPath = null;
                }
            }
        }, CONFIG.TRAIL_PRUNE_INTERVAL_MS);

        // Checks recently active detections to see if any can be triangulated with the new one
        function checkTriangulation(newDet) {
            const now = Date.now();

            // Filter active detections from other towers within the triangulation window
            const coincident = activeDetections.filter(d => {
                if (d.dev_eui === newDet.dev_eui) return false;
                const diff = getSecsDifference(d.node_time, newDet.node_time);
                return diff * 1000 <= TRIANGULATION_WINDOW_MS;
            });

            if (coincident.length === 0) return;

            // Group active coincident towers to get the latest bearing for each EUI
            const activeTowersMap = {};
            activeTowersMap[newDet.dev_eui] = newDet;
            coincident.forEach(d => {
                if (!activeTowersMap[d.dev_eui] || d.timestamp > activeTowersMap[d.dev_eui].timestamp) {
                    activeTowersMap[d.dev_eui] = d;
                }
            });
            const towers = Object.values(activeTowersMap);
            if (towers.length < 2) return;

            // Calculate the centroid/average coordinate of these participating towers for projection origin
            let lat_sum = 0;
            let lon_sum = 0;
            let valid_towers_count = 0;
            towers.forEach(t => {
                const node = nodesData.find(n => n.dev_eui === t.dev_eui);
                if (node) {
                    lat_sum += node.latitude;
                    lon_sum += node.longitude;
                    valid_towers_count++;
                }
            });
            if (valid_towers_count === 0) return;
            const lat_org = lat_sum / valid_towers_count;
            const lon_org = lon_sum / valid_towers_count;

            // Compute pairwise ray intersections in flat local projection
            const R_earth = 6378137.0;
            const intersections = [];
            for (let i = 0; i < towers.length; i++) {
                for (let j = i + 1; j < towers.length; j++) {
                    const detA = towers[i];
                    const detB = towers[j];
                    const nodeA = nodesData.find(n => n.dev_eui === detA.dev_eui);
                    const nodeB = nodesData.find(n => n.dev_eui === detB.dev_eui);
                    if (!nodeA || !nodeB) continue;

                    const posA = latLngToLocalCartesian(nodeA.latitude, nodeA.longitude, lat_org, lon_org);
                    const posB = latLngToLocalCartesian(nodeB.latitude, nodeB.longitude, lat_org, lon_org);

                    const centralInt = getRayIntersection(posA.x, posA.y, detA.azimuth, posB.x, posB.y, detB.azimuth, nodeA.range, nodeB.range);
                    if (centralInt) {
                        intersections.push(centralInt);
                    }
                }
            }

            if (intersections.length === 0) return;

            // Compute the average coordinate center of all pairwise intersections (highest probability zone)
            let sum_x = 0;
            let sum_y = 0;
            intersections.forEach(pt => {
                sum_x += pt.x;
                sum_y += pt.y;
            });
            const avg_x = sum_x / intersections.length;
            const avg_y = sum_y / intersections.length;

            const centerLatLng = localCartesianToLatLng(avg_x, avg_y, lat_org, lon_org);
            lastTriangulationTime = newDet.timestamp;

            // Compute the max spread of intersections (uncertainty boundary radius in meters)
            let max_spread = 20.0; // Minimum visual boundary
            intersections.forEach(pt => {
                const dx = pt.x - avg_x;
                const dy = pt.y - avg_y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > max_spread) {
                    max_spread = dist;
                }
            });

            // Factor in the Angular Uncertainty based on distance from the participating towers to the target centroid
            towers.forEach(t => {
                const node = nodesData.find(n => n.dev_eui === t.dev_eui);
                if (node) {
                    const pos = latLngToLocalCartesian(node.latitude, node.longitude, lat_org, lon_org);
                    const dx = avg_x - pos.x;
                    const dy = avg_y - pos.y;
                    const distToTarget = Math.sqrt(dx * dx + dy * dy);
                    const angularUncertaintyRad = (AZIMUTH_UNCERTAINTY * Math.PI) / 180;
                    const lateralUncertainty = distToTarget * Math.sin(angularUncertaintyRad);
                    if (lateralUncertainty > max_spread) {
                        max_spread = lateralUncertainty;
                    }
                }
            });

            // Resolve sound group color for the pulse marker
            const classInfo = window.soundClasses[newDet.class_id];
            const gName = classInfo ? classInfo.group_name : 'Unknown';
            const groupColor = getGroupColor(gName);

            // Cancel any pending fadeout timeouts or intervals
            if (aircraftFadeTimeout) {
                clearTimeout(aircraftFadeTimeout);
                aircraftFadeTimeout = null;
            }
            if (aircraftFadeInterval) {
                clearInterval(aircraftFadeInterval);
                aircraftFadeInterval = null;
            }

            // Restore marker visibility in case it was actively fading out
            if (activeAircraftMarker && activeAircraftMarker.getElement()) {
                activeAircraftMarker.getElement().style.opacity = '1';
            }

            if (activeAircraftMarker && activeAircraftUncertainty) {
                // Before moving the aircraft to the new centerLatLng, push its current state to the trail!
                const prevLatLng = activeAircraftMarker.getLatLng();
                const prevRadius = activeAircraftUncertainty.getRadius();
                const prevColor = activeAircraftUncertainty.options.color;

                addTrailPoint(prevLatLng, prevRadius, prevColor, centerLatLng);

                // Smoothly pan the aircraft to its newly triangulated center!
                activeAircraftMarker.setLatLng(centerLatLng);
                activeAircraftUncertainty.setLatLng(centerLatLng);
                activeAircraftUncertainty.setRadius(max_spread);

                // Reset styles to full opacity and color
                activeAircraftUncertainty.setStyle({
                    color: groupColor,
                    fillColor: groupColor,
                    opacity: 1.0,
                    fillOpacity: CONFIG.BLOB_FILL_OPACITY
                });

                // Synchronize HTML styling inside L.divIcon dynamically
                const iconDiv = activeAircraftMarker.getElement();
                if (iconDiv) {
                    const dot = iconDiv.querySelector('.radar-pulse-dot');
                    const ring = iconDiv.querySelector('.radar-pulse-ring');
                    if (dot) {
                        dot.style.backgroundColor = groupColor;
                        dot.style.boxShadow = `0 0 10px ${groupColor}`;
                    }
                    if (ring) {
                        ring.style.borderColor = groupColor;
                    }
                }
            } else {
                // Initialize the outer uncertainty boundary circle
                activeAircraftUncertainty = L.circle(centerLatLng, {
                    radius: max_spread,
                    color: groupColor,
                    weight: 1,

                    fillColor: groupColor,
