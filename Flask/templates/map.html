        // Real-time node health updates from mic-check results
        socket.on('node_health', function (data) {
            const node = nodesData.find(n => n.dev_eui === data.dev_eui);
            if (node) {
                node.health_status = data.health_status;
                node.last_health_check = data.last_health_check || new Date().toISOString();
                drawNode(node); // Redraw the node marker with the updated health color
                renderSidebar();
            }
        });

        // Real-time gateway "last seen" updates when a gateway relays an uplink
        socket.on('gateway_seen', function (data) {
            const gw = gatewaysData.find(g => g.gateway_id === data.gateway_id);
            if (gw) {
                gw.last_seen = data.last_seen || new Date().toISOString();
                drawGateway(gw);
                renderSidebar();
            } else {
                // New gateway auto-registered via uplink — fetch its full data
                fetch('/gateways')
                    .then(r => r.json())
                    .then(gws => {
                        if (!Array.isArray(gws)) return;
                        gws.forEach(serverGw => {
                            if (!gatewaysData.find(g => g.gateway_id === serverGw.gateway_id)) {
                                gatewaysData.push(serverGw);
                                drawGateway(serverGw);
                            }
                        });
                        renderSidebar();
                        drawConnections();
                    })
                    .catch(err => console.error("Error fetching new gateway:", err));
            }
        });

        // Configure the map to render horizontally continuous
        //map.options.worldCopyJump = true;

        // ---- Node Health Logic ----

        // Compute the effective health color for a node's range circle.
        function getNodeHealthColor(node) {
            if (!node.last_health_check) return CONFIG.COLOR_STALE;

            const ageMs = Date.now() - new Date(node.last_health_check).getTime();
            if (ageMs > CONFIG.NODE_STALE_MS) return CONFIG.COLOR_STALE;

            if (node.health_status === 'ok') return CONFIG.COLOR_HEALTHY;
            if (node.health_status === 'error') return CONFIG.COLOR_ERROR;
            return CONFIG.COLOR_STALE;
        }

        // Human-readable label for node health (no time shown – staleness is
        // indicated by the color itself since checks happen every 15 min).
        function getNodeHealthLabel(node) {
            if (!node.last_health_check) return '⚠️ Never checked';

            const ageMs = Date.now() - new Date(node.last_health_check).getTime();
            if (ageMs > CONFIG.NODE_STALE_MS) return '⚠️ Stale';

            if (node.health_status === 'ok') return '✅ Healthy';
            if (node.health_status === 'error') return '❌ Mic Error';
            return '⚠️ Unknown';
        }

        // ---- Gateway Health Logic ----

        function getGatewayHealthColor(gw) {
            if (!gw.last_seen) return CONFIG.COLOR_GW_OK;
            const ageMs = Date.now() - new Date(gw.last_seen).getTime();
            if (ageMs > CONFIG.GATEWAY_STALE_MS) return CONFIG.COLOR_STALE;
            return CONFIG.COLOR_GW_OK;
        }

        function getGatewayHealthLabel(gw) {
            if (!gw.last_seen) return '✅ Active';
            const ageMs = Date.now() - new Date(gw.last_seen).getTime();
            if (ageMs > CONFIG.GATEWAY_STALE_MS) return '⚠️ Not seen';
            return '✅ Active';
        }

        function formatAgo(ms) {
            const seconds = Math.floor(ms / 1000);
            if (seconds < 60) return `${seconds}s`;
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m`;
            const hours = Math.floor(minutes / 60);
            const remMin = minutes % 60;
            return `${hours}h ${remMin}m`;
        }

        // Function to draw a node on the map
        function drawNode(node) {
            if (nodeObjects[node.dev_eui]) {
                map.removeLayer(nodeObjects[node.dev_eui].marker);
                map.removeLayer(nodeObjects[node.dev_eui].circle);
                if (nodeObjects[node.dev_eui].tooltip) {
                    map.removeLayer(nodeObjects[node.dev_eui].tooltip);
                }
            }

            // Determine colors based on health freshness
            const rangeColor = getNodeHealthColor(node);
            const healthLabel = getNodeHealthLabel(node);

            // Node dot uses the same color as the range circle
            const nodeIcon = L.divIcon({
                className: 'custom-node-icon',
                html: `<div style="background-color:${rangeColor}; width:12px; height:12px; border-radius:50%; border:2px solid white; box-shadow: 0 0 6px ${rangeColor};"></div>`,
                iconSize: [16, 16],
                iconAnchor: [8, 8]
            });

            const lastCheck = node.last_health_check ? new Date(node.last_health_check).toLocaleString() : 'Never';

            const marker = L.marker([node.latitude, node.longitude], {
                icon: nodeIcon,
                draggable: true
            }).addTo(map);

            marker.on('click', function () {
                showDevicePanel('node', node);
            });

            let tooltip = null;
            if (node.name) {
                tooltip = marker.bindTooltip(node.name, {
                    permanent: true, direction: 'top', className: 'node-tooltip', offset: [0, -10]
                });
            }

            // Range circle color reflects health freshness
            const circle = L.circle([node.latitude, node.longitude], {
                color: rangeColor,
                fillColor: rangeColor,
                fillOpacity: CONFIG.NODE_RANGE_FILL_OPACITY,
                weight: CONFIG.NODE_RANGE_STROKE_WEIGHT,
                opacity: CONFIG.NODE_RANGE_STROKE_OPACITY,
                radius: parseFloat(node.range)
            }).addTo(map);

            marker.on('drag', function (e) {
                const latlng = e.target.getLatLng();
                circle.setLatLng(latlng);
                node.latitude = latlng.lat;
                node.longitude = latlng.lng;
                drawConnections();
            });

            marker.on('dragend', function (e) {
                const latlng = e.target.getLatLng();
                const payload = {
                    name: node.name,
                    latitude: latlng.lat,
                    longitude: latlng.lng,
                    altitude: node.altitude || 0,
                    range: node.range
                };

                fetch(`/nodes/${node.dev_eui}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                }).then(res => res.json()).then(data => {
                    if (data.status === 'ok') {
                        refreshConnections();
                    } else {
                        alert("Failed to move node: " + data.message);
                    }
                }).catch(err => console.error("Error moving node:", err));
            });

            nodeObjects[node.dev_eui] = { marker, circle, tooltip, is_hidden: false };
            drawConnections(); // Redraw connections when a node is drawn/updated
        }

        // Periodically re-evaluate health staleness every 30 seconds.
        // Nodes transition green/red → yellow when last_health_check exceeds 15 min.
        // Gateways transition green → yellow when last_seen exceeds 30 min.
        setInterval(() => {
            nodesData.forEach(node => {
                const obj = nodeObjects[node.dev_eui];
                if (!obj || obj.is_hidden) return;

                const currentColor = getNodeHealthColor(node);
                const circleColor = obj.circle.options.color;

                if (circleColor !== currentColor) {
                    drawNode(node);
                }
            });

            gatewaysData.forEach(gw => {
                const obj = gatewayObjects[gw.gateway_id];
                if (!obj || obj.is_hidden) return;

                const currentColor = getGatewayHealthColor(gw);
                const circleColor = obj.circle.options.color;

                if (circleColor !== currentColor) {
                    drawGateway(gw);
                }
            });

            renderSidebar();
        }, CONFIG.STALENESS_CHECK_INTERVAL_MS);

        // Function to draw a gateway on the map
        function drawGateway(gw) {

                };

                fetch(`/gateways/${gw.gateway_id}`, {

            gatewayObjects[gw.gateway_id] = { marker, circle, tooltip, is_hidden: false };

        // Function to draw connections
        function drawConnections() {
            // Clear all existing connection lines
            for (const dev_eui in connectionLines) {
                map.removeLayer(connectionLines[dev_eui]);
            }

            nodesData.forEach(node => {
                if (node.connected_gateway) {
                    const gw = gatewaysData.find(g => g.gateway_id === node.connected_gateway);
                    if (gw && nodeObjects[node.dev_eui] && gatewayObjects[gw.gateway_id]) {
                        // Only draw if both are visible
                        if (!nodeObjects[node.dev_eui].is_hidden && !gatewayObjects[gw.gateway_id].is_hidden) {
                            const line = L.polyline([
                                [node.latitude, node.longitude],
                                [gw.latitude, gw.longitude]
                            ], {

                                dashArray: '5, 5',

                            }).addTo(map);

            const objs = type === 'node' ? nodeObjects[id] : gatewayObjects[id];

                objs.marker.addTo(map);
                objs.circle.addTo(map);

                if (text.includes(query)) {

                } else {
                    item.style.display = 'none';
                }
            });
        };

        window.editItem = function (type, id) {
            const item = type === 'node' ? nodesData.find(n => n.dev_eui === id) : gatewaysData.find(g => g.gateway_id === id);
            if (!item) return;

            // Fly to the device and open the detail panel
            const objs = type === 'node' ? nodeObjects[id] : gatewayObjects[id];
            if (objs && objs.circle) {
                map.flyToBounds(objs.circle.getBounds(), { padding: [50, 50], maxZoom: 16 });
            } else {
                map.flyTo([item.latitude, item.longitude], 15);
            }

            showDevicePanel(type, item);
        };

        window.deleteItem = function (type, id) {
            const item = type === 'node' ? nodesData.find(n => n.dev_eui === id) : gatewaysData.find(g => g.gateway_id === id);
            if (!item) return;

            const displayName = item.name || (type === 'node' ? item.dev_eui : item.gateway_id);
            const confirmation = window.confirm(`Are you sure you want to delete ${type === 'node' ? 'Node' : 'Gateway'} "${displayName}"?`);

            if (confirmation) {
                const endpoint = type === 'node' ? `/nodes/${id}` : `/gateways/${id}`;
                fetch(endpoint, {
                    method: 'DELETE'
                })
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === 'ok') {
                            // Remove from local arrays
                            if (type === 'node') {
                                const idx = nodesData.findIndex(n => n.dev_eui === id);
                                if (idx !== -1) nodesData.splice(idx, 1);
                                // Remove from map visually
                                if (nodeObjects[id]) {
                                    map.removeLayer(nodeObjects[id].marker);
                                    map.removeLayer(nodeObjects[id].circle);
                                    if (nodeObjects[id].tooltip) map.removeLayer(nodeObjects[id].tooltip);
                                    delete nodeObjects[id];
                                }
                            } else {
                                const idx = gatewaysData.findIndex(n => n.gateway_id === id);
                                if (idx !== -1) gatewaysData.splice(idx, 1);
                                // Remove from map visually
                                if (gatewayObjects[id]) {
                                    map.removeLayer(gatewayObjects[id].marker);
                                    map.removeLayer(gatewayObjects[id].circle);
                                    if (gatewayObjects[id].tooltip) map.removeLayer(gatewayObjects[id].tooltip);
                                    delete gatewayObjects[id];
                                }
                            }

                            // Re-render and re-fetch to fix lines
                            renderSidebar();
                            refreshConnections();
                        } else {
                            alert(`Failed to delete ${type}: ` + data.message);
                        }
                    })
                    .catch(error => {
                        console.error(`Error deleting ${type}:`, error);
                        alert("An error occurred. Check the console.");
                    });
            }
        };

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        let fetchedNodes = false;
        let fetchedGateways = false;

        function initSoundClasses() {
            return fetch('/api/sound_classes')
                .then(response => response.json())
                .then(classes => {
                    window.soundClasses = classes;
                    console.log("Loaded CSV classes: ", Object.keys(window.soundClasses).length);
                })
                .catch(err => console.error("Error fetching sound classes mapping:", err));
        }

        function checkRenderSidebar() {
            if (fetchedNodes && fetchedGateways) {
                renderSidebar();
                drawConnections();
                initSoundClasses().then(() => {
                    fetchRecentDetections();
                });
            }
        }

        function fetchRecentDetections() {
            fetch('/detections/recent')
                .then(response => response.json())
                .then(detections => {
                    if (Array.isArray(detections)) {
                        detections.forEach(det => {
                            if (det.age_ms !== undefined) {
                                // Only draw if under the current FADE_OUT_TIME_MS
                                if (det.age_ms >= 0 && det.age_ms < FADE_OUT_TIME_MS) {
                                    drawDetection(det, det.age_ms);
                                }
                            }
                        });
                    }
                })
                .catch(err => console.error("Error fetching recent detections:", err));
        }

        // Fetch existing gateways
        fetch('/gateways')
            .then(response => response.json())
            .then(gws => {
                if (Array.isArray(gws)) {
                    gws.forEach(gw => {
                        gatewaysData.push(gw);
                        drawGateway(gw);
                    });
                }
                fetchedGateways = true;
                checkRenderSidebar();
            })
            .catch(err => console.error("Error fetching gateways:", err));

        // Fetch existing nodes
        fetch('/nodes')
            .then(response => response.json())
            .then(nodes => {
                if (Array.isArray(nodes)) {
                    nodes.forEach(node => {
                        nodesData.push(node);
                        drawNode(node);
                    });
                }
                fetchedNodes = true;
                checkRenderSidebar();
            })
            .catch(err => console.error("Error fetching nodes:", err));

        // Refetch nodes to get updated connections
        function refreshConnections() {
            fetch('/nodes')
                .then(response => response.json())
                .then(nodes => {
                    if (Array.isArray(nodes)) {
                        nodesData.length = 0; // clear array perfectly
                        nodes.forEach(node => {
                            nodesData.push(node);
                            drawNode(node);
                        });
                    }
                    renderSidebar();
                });
        }

        function openFormPopup(lat, lng, editData = null, forceType = null) {
            // If not editing, allow the user to choose type by Radio button. If forceType is provided (via edit) lock the type.
            const isEdit = editData !== null;
            let defaultType = forceType || 'node'; // 'node' or 'gateway'

            const defaultId = isEdit ? (editData.dev_eui || editData.gateway_id) : '';
            const defaultName = isEdit ? (editData.name || '') : '';
            const defaultRange = isEdit ? editData.range : (defaultType === 'gateway' ? '5000' : '2000');
            const defaultAltitude = isEdit ? (editData.altitude || 0) : 0;

            // ─── Modern Form Modal (glassmorphic overlay) ───
            const selectedType = defaultType || 'node';
            const idLabel = selectedType === 'node' ? 'Device EUI' : 'Gateway ID';
            const idPlaceholder = selectedType === 'node' ? 'e.g. 0011223344556677' : 'e.g. 11223344aabbccdd';

            // Remove any existing overlay
            const existingOverlay = document.querySelector('.modern-form-overlay');
            if (existingOverlay) existingOverlay.remove();

            const overlay = document.createElement('div');
            overlay.className = 'modern-form-overlay';
            overlay.innerHTML = `
                <div class="modern-form-card">
                    <div class="mf-header">
                        <div class="mf-title">${isEdit ? '✏️ Edit Item' : '📍 Place on Map'}</div>
                        <div class="mf-close" id="mf-close-btn">✕</div>
                    </div>

                    ${!isEdit ? `
                    <div class="mf-type-toggle">
                        <button class="mf-type-btn ${selectedType === 'node' ? 'active' : ''}" data-type="node" id="mf-btn-node">📡 Node</button>
                        <button class="mf-type-btn ${selectedType === 'gateway' ? 'active' : ''}" data-type="gateway" id="mf-btn-gateway">🏗️ Gateway</button>
                    </div>` : `
                    <div style="padding: 12px 20px 0;">
                        <span style="font-size: 12px; font-weight: 600; color: ${defaultType === 'node' ? '#a78bfa' : '#34d399'};">${defaultType === 'node' ? '📡 Node' : '🏗️ Gateway'}</span>
                    </div>`}

                    <div class="mf-body">
                        ${!isEdit ? `
                        <div class="mf-field">
                            <label id="mf-id-label">${idLabel}</label>
                            <input type="text" id="mf-item-id" placeholder="${idPlaceholder}" value="${defaultId}">
                        </div>` : `
                        <div class="mf-field">
                            <label>ID</label>
                            <div style="color: #94a3b8; font-size: 12px; font-family: monospace; padding: 6px 0;">${defaultId}</div>
                        </div>`}

                        <div class="mf-field">
                            <label>Name</label>
                            <input type="text" id="mf-item-name" placeholder="e.g. Campus Roof" value="${defaultName}">
                        </div>

                        <div class="mf-field">
                            <label>Range (meters)</label>
                            <input type="number" id="mf-item-range" placeholder="e.g. 5000" value="${defaultRange}">
                        </div>

                        <div class="mf-field">
                            <label>Altitude (meters)</label>
                            <input type="number" id="mf-item-altitude" placeholder="e.g. 10" value="${defaultAltitude}">
                        </div>

                        <div style="font-size: 10px; color: #475569; margin-top: -4px;">
                            📌 ${lat.toFixed(6)}, ${lng.toFixed(6)}
                        </div>
                    </div>

                    <div class="mf-actions">
                        <button class="mf-btn-save" id="mf-save-btn">${isEdit ? 'Save Changes' : 'Save'}</button>
                        <button class="mf-btn-cancel" id="mf-cancel-btn">Cancel</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);

            // Close handlers
            const closeForm = () => overlay.remove();
            document.getElementById('mf-close-btn').addEventListener('click', closeForm);
            document.getElementById('mf-cancel-btn').addEventListener('click', closeForm);
            overlay.addEventListener('click', (e) => { if (e.target === overlay) closeForm(); });

            // Type toggle buttons (only for new items)
            let currentFormType = selectedType;
            if (!isEdit) {
                const btnNode = document.getElementById('mf-btn-node');
                const btnGW = document.getElementById('mf-btn-gateway');
                const rangeInput = document.getElementById('mf-item-range');
                btnNode.addEventListener('click', () => {
                    btnNode.classList.add('active'); btnGW.classList.remove('active');
                    currentFormType = 'node';
                    document.getElementById('mf-id-label').textContent = 'Device EUI';
                    document.getElementById('mf-item-id').placeholder = 'e.g. 0011223344556677';
                    if (rangeInput && (rangeInput.value === '5000' || rangeInput.value === '2000' || !rangeInput.value)) {
                        rangeInput.value = '2000';
                    }
                });
                btnGW.addEventListener('click', () => {
                    btnGW.classList.add('active'); btnNode.classList.remove('active');
                    currentFormType = 'gateway';
                    document.getElementById('mf-id-label').textContent = 'Gateway ID';
                    document.getElementById('mf-item-id').placeholder = 'e.g. 11223344aabbccdd';
                    if (rangeInput && (rangeInput.value === '2000' || rangeInput.value === '5000' || !rangeInput.value)) {
                        rangeInput.value = '5000';
                    }
                });
            }

            // Save handler
            document.getElementById('mf-save-btn').addEventListener('click', () => {
                const type = isEdit ? defaultType : currentFormType;
                const idVal = isEdit ? defaultId : document.getElementById('mf-item-id').value;
                const name = document.getElementById('mf-item-name').value;
                const range = document.getElementById('mf-item-range').value;
                const altitude = document.getElementById('mf-item-altitude').value || 0;

                if (!idVal || !range) {
                    alert('ID and Range are required!');
                    return;
                }

                const payload = {
                    name: name,
                    latitude: lat,
                    longitude: lng,
                    altitude: parseFloat(altitude),
                    range: range
                };
                if (type === 'node') payload.dev_eui = idVal;
                if (type === 'gateway') payload.gateway_id = idVal;

                const endpoint = type === 'node'
                    ? (isEdit ? `/nodes/${idVal}` : '/nodes')
                    : (isEdit ? `/gateways/${idVal}` : '/gateways');

                fetch(endpoint, {
                    method: isEdit ? 'PUT' : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                })
                    .then(r => r.json())
                    .then(data => {
                        if (data.status === 'ok') {
                            if (isEdit) {
                                const arr = type === 'node' ? nodesData : gatewaysData;
                                const key = type === 'node' ? 'dev_eui' : 'gateway_id';
                                const idx = arr.findIndex(n => n[key] === idVal);
                                if (idx !== -1) arr[idx] = payload;
                                currentEditId = null;
                                currentEditType = null;
                            } else {
                                if (type === 'node') nodesData.push(payload);
                                if (type === 'gateway') gatewaysData.push(payload);
                            }
                            refreshConnections();
                            if (type === 'gateway') drawGateway(payload);
                            closeForm();
                        } else {
                            alert(`Failed to ${isEdit ? 'update' : 'add'} ${type}: ` + data.message);
                        }
                    })
                    .catch(err => {
                        console.error(`Error saving ${type}:`, err);
                        alert('An error occurred. Check the console.');
                    });
            });
        }

        // ─── Right-click Context Menu (replaces left-click add) ───
        let activeContextMenu = null;

        function removeContextMenu() {
            if (activeContextMenu) {
                activeContextMenu.remove();
                activeContextMenu = null;
            }
        }

        // Suppress default browser context menu on the map
        document.getElementById('map').addEventListener('contextmenu', e => e.preventDefault());

        // Left-click on map: close context menu, deselect aircraft, clear track, close device panel
        map.on('click', function () {
            removeContextMenu();
            if (currentEditId !== null) {
                currentEditId = null;
                currentEditType = null;
            }
            // Close aircraft detail panel and clear track
            if (selectedAcData) {
                hideDetailPanel();
                clearTrack();
                selectedAircraftHex = null;
            }
            // Close device detail panel
            hideDevicePanel();
        });

        // Escape key: close detail panel, context menu, and form overlays
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                removeContextMenu();
                if (selectedAcData) {
                    hideDetailPanel();
                    clearTrack();
                    selectedAircraftHex = null;
                }
                // Close device detail panel
                hideDevicePanel();
                // Also close any open form overlay
                const overlay = document.querySelector('.modern-form-overlay');
                if (overlay) overlay.remove();
            }
        });

        // Right-click on map: show context menu
        map.on('contextmenu', function (e) {
            removeContextMenu();
            const lat = e.latlng.lat;
            const lng = e.latlng.lng;

            const menu = document.createElement('div');
            menu.className = 'map-context-menu';

            // Position relative to the map container
            const mapEl = document.getElementById('map');
            const rect = mapEl.getBoundingClientRect();
            let x = e.originalEvent.clientX - rect.left;
            let y = e.originalEvent.clientY - rect.top;

            // Prevent overflowing off-screen
            if (x + 200 > rect.width) x = rect.width - 200;
            if (y + 140 > rect.height) y = rect.height - 140;

            menu.style.left = x + 'px';
            menu.style.top = y + 'px';

            menu.innerHTML = `
                <div class="ctx-menu-item" id="ctx-add-node">
                    <span class="ctx-icon">📡</span>
                    <span>Add Node</span>
                </div>
                <div class="ctx-menu-item" id="ctx-add-gateway">
                    <span class="ctx-icon">🏗️</span>
                    <span>Add Gateway</span>
                </div>
                <div class="ctx-menu-separator"></div>
                <div class="ctx-menu-coords">${lat.toFixed(6)}, ${lng.toFixed(6)}</div>
            `;

            mapEl.appendChild(menu);
            activeContextMenu = menu;

            // Context menu actions
            document.getElementById('ctx-add-node').addEventListener('click', () => {
                removeContextMenu();
                openFormPopup(lat, lng, null, 'node');
            });

            document.getElementById('ctx-add-gateway').addEventListener('click', () => {
                removeContextMenu();
                openFormPopup(lat, lng, null, 'gateway');
            });

            // Close on any subsequent click
            const closeHandler = () => {
                removeContextMenu();
                document.removeEventListener('click', closeHandler);
            };
            setTimeout(() => document.addEventListener('click', closeHandler), 0);
        });

        // --- User Geolocation Feature --- Removed

        // Add sidebar toggle control button
        L.Control.SidebarToggle = L.Control.extend({
            options: {
                position: 'topright'
            },
            onAdd: function (map) {
                const container = L.DomUtil.create('div', 'leaflet-bar leaflet-control leaflet-control-sidebar-toggle');
                container.innerHTML = '☰'; // Hamburger menu icon
                container.title = "Toggle Nodes Sidebar";

                container.onclick = function (e) {

                    toggleSidebar();
                }
                return container;
            }
        });

        map.addControl(new L.Control.SidebarToggle());

        // ─── Device Detail Panel Logic ────────────────────────────────
        let selectedDeviceData = null;
        let selectedDeviceType = null; // 'node' or 'gateway'
        let devicePanelEditMode = false;

        // Close button
        document.getElementById('ddp-close-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            hideDevicePanel();
        });

        function showDevicePanel(type, data) {
            // Close ADS-B panel if open
            if (selectedAcData) {
                hideDetailPanel();
                clearTrack();
                selectedAircraftHex = null;
            }

            selectedDeviceType = type;
            selectedDeviceData = data;
            devicePanelEditMode = false;

            renderDevicePanelView();
            document.getElementById('device-detail-panel').classList.add('open');
        }

        function hideDevicePanel() {
            document.getElementById('device-detail-panel').classList.remove('open');
            selectedDeviceData = null;
            selectedDeviceType = null;
            devicePanelEditMode = false;
        }

        function renderDevicePanelView() {
            if (!selectedDeviceData) return;

            const data = selectedDeviceData;
            const type = selectedDeviceType;
            const isNode = type === 'node';
            const id = isNode ? data.dev_eui : data.gateway_id;

            // Header
            document.getElementById('ddp-name').textContent = data.name || (isNode ? 'Unnamed Node' : 'Unnamed Gateway');
            document.getElementById('ddp-subtitle').innerHTML = `<span style="color:${isNode ? '#a78bfa' : '#34d399'}">${isNode ? '📡 Node' : '🏗️ Gateway'}</span> · <span style="font-family:monospace;font-size:11px">${id}</span>`;

            // ID section
            const idSection = document.getElementById('ddp-id-section');
            idSection.innerHTML = `
                <div class="adp-row"><span class="adp-label">${isNode ? 'Device EUI' : 'Gateway ID'}</span><span class="adp-value" style="font-family:monospace;font-size:11px">${id}</span></div>
                <div class="adp-row"><span class="adp-label">Name</span><span class="adp-value" id="ddp-name-val">${data.name || '—'}</span></div>
            `;

            // Location section
            const locSection = document.getElementById('ddp-location-section');
            locSection.innerHTML = `
                <div class="adp-row"><span class="adp-label">Position</span><span class="adp-value">${(data.latitude || 0).toFixed(6)}, ${(data.longitude || 0).toFixed(6)}</span></div>
                <div class="adp-row"><span class="adp-label">Altitude</span><span class="adp-value" id="ddp-alt-val">${data.altitude || 0} m</span></div>
                <div class="adp-row"><span class="adp-label">Range</span><span class="adp-value" id="ddp-range-val">${data.range || 0} m</span></div>

                const lastCheck = data.last_health_check ? new Date(data.last_health_check).toLocaleString() : 'Never';
                const connGw = data.connected_gateway
                    ? (gatewaysData.find(g => g.gateway_id === data.connected_gateway)?.name || data.connected_gateway.substring(0, 12) + '…')
                    : 'None';
                statusSection.innerHTML = `
                    <div class="adp-row"><span class="adp-label">Health</span><span class="adp-value" style="color:${healthColor}">${healthLabel}</span></div>
                    <div class="adp-row"><span class="adp-label">Last Check</span><span class="adp-value">${lastCheck}</span></div>
                    <div class="adp-row"><span class="adp-label">Gateway</span><span class="adp-value">${connGw}</span></div>
                `;
            } else {
                const gwColor = getGatewayHealthColor(data);
                const gwLabel = getGatewayHealthLabel(data);
                const lastSeen = data.last_seen ? new Date(data.last_seen).toLocaleString() : 'Never';
                const connNodes = nodesData.filter(n => n.connected_gateway === data.gateway_id).length;
                statusSection.innerHTML = `
                    <div class="adp-row"><span class="adp-label">Status</span><span class="adp-value" style="color:${gwColor}">${gwLabel}</span></div>
                    <div class="adp-row"><span class="adp-label">Last Seen</span><span class="adp-value">${lastSeen}</span></div>
                    <div class="adp-row"><span class="adp-label">Connected Nodes</span><span class="adp-value">${connNodes}</span></div>
                `;

            // Actions — view mode
            const actionsDiv = document.getElementById('ddp-actions');
            actionsDiv.innerHTML = `
                <button class="ddp-btn" id="ddp-edit-btn">✏️ Edit</button>
                <button class="ddp-btn ddp-btn-delete" id="ddp-delete-btn">🗑️ Delete</button>
            `;
            document.getElementById('ddp-edit-btn').addEventListener('click', enterDeviceEditMode);
            document.getElementById('ddp-delete-btn').addEventListener('click', deleteDeviceFromPanel);

        function enterDeviceEditMode() {
            if (!selectedDeviceData) return;
            devicePanelEditMode = true;

            const data = selectedDeviceData;
            const type = selectedDeviceType;
            const isNode = type === 'node';
            const id = isNode ? data.dev_eui : data.gateway_id;

            // ID section — name becomes editable
            const idSection = document.getElementById('ddp-id-section');
            idSection.innerHTML = `
                <div class="adp-row"><span class="adp-label">${isNode ? 'Device EUI' : 'Gateway ID'}</span><span class="adp-value" style="font-family:monospace;font-size:11px">${id}</span></div>
                <div class="adp-row"><span class="adp-label">Name</span><span class="adp-value"><input class="ddp-edit-input" id="ddp-edit-name" value="${data.name || ''}" placeholder="Enter name" style="width:130px"></span></div>
            `;

            // Location section — altitude and range become editable
            const locSection = document.getElementById('ddp-location-section');
            locSection.innerHTML = `
                <div class="adp-row"><span class="adp-label">Position</span><span class="adp-value">${(data.latitude || 0).toFixed(6)}, ${(data.longitude || 0).toFixed(6)}</span></div>
                <div class="adp-row"><span class="adp-label">Altitude</span><span class="adp-value"><input class="ddp-edit-input" id="ddp-edit-alt" type="number" value="${data.altitude || 0}"> m</span></div>
                <div class="adp-row"><span class="adp-label">Range</span><span class="adp-value"><input class="ddp-edit-input" id="ddp-edit-range" type="number" value="${data.range || 0}"> m</span></div>
            `;

            // Actions — edit mode
            const actionsDiv = document.getElementById('ddp-actions');
            actionsDiv.innerHTML = `
                <button class="ddp-btn ddp-btn-save" id="ddp-save-btn">💾 Save</button>
                <button class="ddp-btn" id="ddp-cancel-btn">Cancel</button>
            `;
            document.getElementById('ddp-save-btn').addEventListener('click', saveDeviceChanges);
            document.getElementById('ddp-cancel-btn').addEventListener('click', cancelDeviceEdit);

            // Focus the name field
            setTimeout(() => document.getElementById('ddp-edit-name')?.focus(), 50);
        }

        function cancelDeviceEdit() {
            devicePanelEditMode = false;
            renderDevicePanelView();
        }

        function saveDeviceChanges() {
            if (!selectedDeviceData || !selectedDeviceType) return;

            const type = selectedDeviceType;
            const data = selectedDeviceData;
            const isNode = type === 'node';
            const id = isNode ? data.dev_eui : data.gateway_id;

            const name = document.getElementById('ddp-edit-name').value;
            const altitude = parseFloat(document.getElementById('ddp-edit-alt').value) || 0;
            const range = document.getElementById('ddp-edit-range').value;

            if (!range) {
                alert('Range is required!');
                return;
            }

            const payload = {
                name: name,
                latitude: data.latitude,
                longitude: data.longitude,
                altitude: altitude,
                range: range
            };

            const endpoint = isNode ? `/nodes/${id}` : `/gateways/${id}`;

            fetch(endpoint, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(r => r.json())
            .then(result => {
                if (result.status === 'ok') {
                    // Update local data
                    data.name = name;
                    data.altitude = altitude;
                    data.range = range;

                    // Redraw on map
                    if (isNode) drawNode(data);
                    else drawGateway(data);

                    refreshConnections();
                    renderSidebar();

                    // Switch back to view mode with updated data
                    devicePanelEditMode = false;
                    renderDevicePanelView();
                } else {
                    alert('Failed to update: ' + result.message);
                }
            })
            .catch(err => {
                console.error('Error saving device:', err);
                alert('An error occurred. Check the console.');
            });
        }

        function deleteDeviceFromPanel() {
            if (!selectedDeviceData || !selectedDeviceType) return;

            const type = selectedDeviceType;
            const isNode = type === 'node';
            const id = isNode ? selectedDeviceData.dev_eui : selectedDeviceData.gateway_id;

            hideDevicePanel();
            window.deleteItem(type, id);
        }

    </script>
</body>
